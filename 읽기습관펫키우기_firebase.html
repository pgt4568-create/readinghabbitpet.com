<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG

   https://console.firebase.google.com → 프로젝트 설정 → 웹 앱 추가
═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrZuHqssiCJCpV5mh6hlvH1kPk8sCSI6w",
  authDomain: "mypet-readinghabbit.firebaseapp.com",
  projectId: "mypet-readinghabbit",
  storageBucket: "mypet-readinghabbit.firebasestorage.app",
  messagingSenderId: "402856879124",
  appId: "1:402856879124:web:81152517c0fe65182c3301",
  measurementId: "G-P8VJ80G538"
};

let fbApp, fbAuth, fbDb;
let FB_READY = false;

function initFirebase() {
  try {
    if (!firebase.apps.length) {
      fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
    } else {
      fbApp  = firebase.app();
    }
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
    FB_READY = true;
  } catch(e) {
    console.warn('Firebase init failed – running in DEMO mode', e);
    FB_READY = false;
  }
}
initFirebase();

/* ── Firestore path helpers ──
   /teachers/{uid}/
   /teachers/{uid}/classes/{classId}/
   /teachers/{uid}/classes/{classId}/students/{studentId}
   /teachers/{uid}/classes/{classId}/records/{recordId}
*/
const col  = (...parts) => fbDb.collection(parts.join('/'));
const doc  = (...parts) => fbDb.doc(parts.join('/'));

/* ── Auth helpers ── */
async function signUpTeacher(email, password) {
  const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
  await doc('teachers', cred.user.uid).set({ email, createdAt: Date.now() });
  return cred.user;
}
async function signInTeacher(email, password) {
  const cred = await fbAuth.signInWithEmailAndPassword(email, password);
  return cred.user;
}
async function signOutTeacher() { await fbAuth.signOut(); }

/* ── Class CRUD ── */
async function createClass(uid, name) {
  const ref = await col('teachers', uid, 'classes').add({ name, createdAt: Date.now(), code: makeCode() });
  return { id: ref.id, name };
}
async function getClasses(uid) {
  const snap = await col('teachers', uid, 'classes').orderBy('createdAt').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function deleteClass(uid, classId) {
  // delete students & records subcollections first
  const sts = await col('teachers', uid, 'classes', classId, 'students').get();
  const rcs = await col('teachers', uid, 'classes', classId, 'records').get();
  const batch = fbDb.batch();
  sts.docs.forEach(d => batch.delete(d.ref));
  rcs.docs.forEach(d => batch.delete(d.ref));
  batch.delete(doc('teachers', uid, 'classes', classId));
  await batch.commit();
}
async function updateClassName(uid, classId, name) {
  await doc('teachers', uid, 'classes', classId).update({ name });
}

/* ── Student CRUD ── */
async function getStudents(uid, classId) {
  const snap = await col('teachers', uid, 'classes', classId, 'students').orderBy('num').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function addStudent(uid, classId, data) {
  const ref = await col('teachers', uid, 'classes', classId, 'students').add(data);
  return { id: ref.id, ...data };
}
async function updateStudent(uid, classId, studentId, updates) {
  await doc('teachers', uid, 'classes', classId, 'students', studentId).update(updates);
}
async function deleteStudent(uid, classId, studentId) {
  const recs = await col('teachers', uid, 'classes', classId, 'records')
    .where('sid', '==', studentId).get();
  const batch = fbDb.batch();
  recs.docs.forEach(d => batch.delete(d.ref));
  batch.delete(doc('teachers', uid, 'classes', classId, 'students', studentId));
  await batch.commit();
}

/* ── Records CRUD ── */
async function getRecords(uid, classId) {
  const snap = await col('teachers', uid, 'classes', classId, 'records').orderBy('date','desc').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function addRecord(uid, classId, data) {
  const ref = await col('teachers', uid, 'classes', classId, 'records').add(data);
  return { id: ref.id, ...data };
}

/* ── Class code lookup (student join) ──
   Stores a global lookup: /classCodes/{code} → {uid, classId}
*/
function makeCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}
async function resolveCode(code) {
  const snap = await fbDb.collection('classCodes').doc(code.toUpperCase()).get();
  return snap.exists ? snap.data() : null;
}
async function registerCode(code, uid, classId, className) {
  await fbDb.collection('classCodes').doc(code.toUpperCase()).set({ uid, classId, className });
}
</script>

const SCREENING_RULES = {
  minBookLen: 2,
  minSceneLen: 10,
  minWordLen: 2,
  forbiddenWords: ['ㅋ','ㅎ','ㄱ','ㅠ','ㅡ','...','모름','없음','몰라','없어','그냥'],
  check(form) {
    const issues = [];
    if (!form.book || form.book.trim().length < this.minBookLen) issues.push('책 제목이 너무 짧아요');
    if (!form.scene || form.scene.trim().length < this.minSceneLen) issues.push('인상적인 장면 설명이 너무 짧아요 (10자 이상)');
    const hasForbidden = this.forbiddenWords.some(w =>
      (form.scene||'').includes(w)
    );
    if (hasForbidden) issues.push('성의 있게 작성해 주세요 😊');
    return { pass: issues.length === 0, issues };
  }
};

const getPetStage = (xp, petType) => {
  const lib = PET_LIBRARY[petType] || PET_LIBRARY.dog;
  return lib.stages.find(s => (xp||0) >= s.minXP && (xp||0) <= s.maxXP) || lib.stages[lib.stages.length-1];
};
const getAllStages = (petType) => (PET_LIBRARY[petType] || PET_LIBRARY.dog).stages;
const getBadges = st => BADGES.filter(b => b.cond(st));
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = d => { if(!d) return '-'; const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const daysDiff = d => { if(!d) return 99; return Math.round((Date.now() - new Date(d)) / 86400000); };
const getItem = id => SHOP_ITEMS.find(i => i.id === id);
const calcXP = (form, streak) => {
  let xp = XP_TABLE.base;
  xp += XP_TABLE.streakBonus(streak||0);
  if(form.word?.trim()) xp += XP_TABLE.wordBonus;
  if(form.bonusAns?.trim()) xp += XP_TABLE.bonusQ;
  return xp;
};

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2600); return () => clearTimeout(t); }, []);
  return <div className="notification">✅ {msg}</div>;
}

function Confetti() {
  const cols = ['#FF6B6B','#FFD700','#4ECDC4','#A770EF','#56AB2F','#FF8E53'];
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>
      {Array.from({length:32},(_,i) => (
        <div key={i} style={{
          position:'absolute', left:`${Math.random()*100}%`, top:'-20px',
          width:8+Math.random()*8, height:8+Math.random()*8,
          background:cols[i%cols.length], borderRadius:'2px',
          animation:`confettiFall ${1.5+Math.random()}s ease-in ${Math.random()*.8}s both`,
          transform:`rotate(${Math.random()*360}deg)`,
        }}/>
      ))}
    </div>
  );
}

function XPBar({ xp, petType }) {
  const stage = getPetStage(xp, petType);
  const allStages = getAllStages(petType);
  const next = allStages.find(s => s.stage === stage.stage + 1);
  const inStage = (xp||0) - stage.minXP;
  const need = next ? next.minXP - stage.minXP : 1;
  const pct = next ? Math.min(100, Math.round(inStage/need*100)) : 100;
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#aaa',marginBottom:4}}>
        <span>XP {xp||0}</span>
        {next ? <span>{next.name}까지 {need-inStage} XP</span> : <span>최고 단계! 🏆</span>}
      </div>
      <div className="progress-outer"><div className="progress-inner" style={{width:`${pct}%`}}/></div>
    </div>
  );
}

/* ── shared SVG animation ids (injected once) ── */
function SvgDefs() {
  return (
    <svg width="0" height="0" style={{position:'absolute'}}>
      <defs>
        <filter id="petShadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="4" stdDeviation="4" floodColor="rgba(0,0,0,0.18)"/>
        </filter>
        <filter id="petGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="groundGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="rgba(0,0,0,0.12)"/>
          <stop offset="100%" stopColor="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>
    </svg>
  );
}

/* ── blink hook ── */
function useBlink() {
  const [blink, setBlink] = useState(false);
  useEffect(() => {
    const schedule = () => {
      const delay = 2500 + Math.random() * 3000;
      return setTimeout(() => {
        setBlink(true);
        setTimeout(() => { setBlink(false); schedule(); }, 130);
      }, delay);
    };
    const t = schedule();
    return () => clearTimeout(t);
  }, []);
  return blink;
}

/* ── Eye shape helper ── */
function Eye({ cx, cy, r=5, blink=false, color='#2d1a0e', shine=true }) {
  return (
    <g>
      <ellipse cx={cx} cy={cy} rx={r} ry={blink ? 0.8 : r} fill={color} style={{transition:'ry .06s'}}/>
      {shine && !blink && <circle cx={cx+r*0.35} cy={cy-r*0.35} r={r*0.28} fill="rgba(255,255,255,0.85)"/>}
    </g>
  );
}

function PetDisplay({ student, size='lg', showItems=true }) {
  const petType = student?.petType || 'dog';
  const xp = student?.xp || 0;
  const stage = getPetStage(xp, petType);
  const equipped = student?.equipped || {};
  const hatEmoji = equipped.hat ? getItem(equipped.hat)?.emoji : null;
  const accEmoji = equipped.acc ? getItem(equipped.acc)?.emoji : null;
  const bgItem = equipped.bg ? getItem(equipped.bg) : null;
  const blink = useBlink();

  const SvgComponent = PET_SVG_MAP[petType] || PetSvg_Dog;
  const bgStyle = bgItem
    ? { background: bgItem.bgColor || stage.color }
    : { background: `linear-gradient(160deg,${stage.color} 0%,#fff 100%)` };

  const sz = size === 'lg' ? 160 : size === 'md' ? 80 : 48;

  if(size === 'sm') {
    // sm: still use emoji for tiny contexts (teacher dashboard etc)
    return <span style={{fontSize:32}}>{stage.emoji}</span>;
  }

  return (
    <div style={{position:'relative',display:'inline-block',lineHeight:1}}>
      <SvgDefs/>
      {size === 'lg' && (
        <div style={{...bgStyle,borderRadius:26,padding:'18px 24px',textAlign:'center',boxShadow:'0 6px 28px rgba(0,0,0,.12)',position:'relative',overflow:'hidden'}}>
          {/* bg shimmer for high level */}
          {stage.stage >= 7 && (
            <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(255,255,255,0) 40%,rgba(255,255,255,0.25) 50%,rgba(255,255,255,0) 60%)',backgroundSize:'200% 200%',animation:'shimmer 2.5s linear infinite',pointerEvents:'none'}}/>
          )}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
            {showItems && hatEmoji && (
              <div style={{fontSize:sz*0.28,lineHeight:1,marginBottom:'-8px',zIndex:2,animation:'bounce 2s infinite'}}>{hatEmoji}</div>
            )}
            <div className="float-anim" style={{lineHeight:1}}>
              <SvgComponent
                stage={stage} blink={blink}
                hat={showItems&&hatEmoji?null:null}
                acc={showItems&&accEmoji?accEmoji:null}
                bgColor={bgItem?.bgColor}
                size={sz}/>
            </div>
            {showItems && accEmoji && !['hat'].includes(getItem(equipped.acc)?.type) && (
              <div style={{fontSize:sz*0.22,marginTop:'-6px',animation:'heartbeat 2s infinite'}}>{accEmoji}</div>
            )}
          </div>
        </div>
      )}
      {size === 'md' && (
        <div style={{position:'relative',textAlign:'center',animation:'breathe 3s ease-in-out infinite'}}>
          <SvgComponent stage={stage} blink={blink} hat={showItems?hatEmoji:null} acc={showItems?accEmoji:null} size={sz}/>
        </div>
      )}
    </div>
  );
}

function BarChart({ data }) {
  const max = Math.max(...data.map(d=>d.val), 1);
  const colors = ['#FF6B6B','#FF8E53','#FFD200','#56AB2F','#4ECDC4','#A770EF'];
  return (
    <div className="bar-chart">
      {data.map((d,i) => (
        <div key={i} className="bar-row">
          <div className="bar-label">{d.name}</div>
          <div className="bar-track">
            <div className="bar-fill" style={{width:`${Math.round(d.val/max*100)}%`,background:colors[i%colors.length]}}>
              {d.val > 0 ? d.val : ''}
            </div>
          </div>
          <div className="bar-val">{d.val}</div>
        </div>
      ))}
    </div>
  );
}

function DonutChart({ data }) {
  const total = data.reduce((s,d)=>s+d.val,0)||1;
  const colors = ['#FF6B6B','#4ECDC4','#FFD200','#A770EF','#56AB2F','#FF8E53'];
  let deg = 0;
  const stops = data.map((d,i)=>{ const pct=d.val/total*360; const s=`${colors[i%colors.length]} ${deg}deg ${deg+pct}deg`; deg+=pct; return s; }).join(', ');
  const top = [...data].sort((a,b)=>b.val-a.val)[0];
  return (
    <div style={{display:'flex',alignItems:'center',gap:18,flexWrap:'wrap'}}>
      <div className="donut" style={{background:`conic-gradient(${stops})`}}>
        <div className="donut-hole">
          <div style={{fontSize:18,fontWeight:800,color:'#FF6B6B'}}>{top?.emoji}</div>
          <div style={{fontSize:10,fontWeight:700,color:'#555'}}>{top?.key}</div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {data.filter(d=>d.val>0).map((d,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:colors[i%colors.length],flexShrink:0}}/>
            <span style={{fontSize:12,color:'#555'}}>{d.emoji} {d.key}: {d.val}회</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* PIN Input */
function PinInput({ value, onChange }) {
  const refs = [useRef(), useRef(), useRef(), useRef()];
  const digits = (value||'').split('').concat(['','','','']).slice(0,4);
  const handleKey = (i, e) => {
    if(e.key >= '0' && e.key <= '9') {
      const arr = digits.slice();
      arr[i] = e.key;
      onChange(arr.join(''));
      if(i < 3) refs[i+1].current?.focus();
      e.preventDefault();
    } else if(e.key === 'Backspace') {
      const arr = digits.slice();
      if(arr[i]) { arr[i]=''; onChange(arr.join('')); }
      else if(i > 0) { arr[i-1]=''; onChange(arr.join('')); refs[i-1].current?.focus(); }
      e.preventDefault();
    }
  };
  return (
    <div className="pin-row">
      {digits.map((d,i)=>(
        <input key={i} ref={refs[i]} className="pin-digit" type="password" maxLength={1}
          value={d} readOnly
          onFocus={()=>{}}
          onKeyDown={e=>handleKey(i,e)}
          onClick={()=>refs[i].current?.focus()}
          inputMode="numeric"
        />
      ))}
    </div>
  );
}

function StudentLogin({ students, onLogin, onRegister, onBack, classLabel }) {
  const [mode, setMode]   = useState('login');
  const [name, setName]   = useState('');
  const [pin, setPin]     = useState('');
  const [err, setErr]     = useState('');
  const nameRef           = useRef();

  // Register state
  const [rName, setRName]       = useState('');
  const [rPin, setRPin]         = useState('');
  const [rPin2, setRPin2]       = useState('');
  const [rPetName, setRPetName] = useState('');
  const [rPetType, setRPetType] = useState('dog');

  const tryLogin = () => {
    const trimmed = name.trim();
    if(!trimmed) { setErr('이름을 입력해 주세요'); return; }
    if(pin.length < 4) { setErr('비밀번호 4자리를 입력해 주세요'); return; }
    const found = students.find(s => s.name === trimmed);
    if(!found) { setErr('등록된 이름이 없어요. 새로 등록해 주세요!'); return; }
    if(found.password !== pin) { setErr('비밀번호가 틀렸어요! 🔐'); setPin(''); return; }
    setErr(''); onLogin(found);
  };

  const tryRegister = () => {
    if(!rName.trim()) { setErr('이름을 입력해 주세요'); return; }
    if(rPin.length < 4) { setErr('비밀번호 4자리를 입력해 주세요'); return; }
    if(rPin !== rPin2) { setErr('비밀번호가 일치하지 않아요!'); return; }
    if(!rPetName.trim()) { setErr('펫 이름을 입력해 주세요'); return; }
    if(students.some(s=>s.name===rName.trim())) { setErr('이미 있는 이름이에요'); return; }
    onRegister({ name:rName.trim(), password:rPin, petName:rPetName.trim(), petType:rPetType });
  };

  return (
    <div style={{background:'linear-gradient(160deg,#FFF5E4,#FFE5CC)',minHeight:'100vh',padding:'20px 18px'}}>
      <button onClick={onBack} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',marginBottom:10}}>←</button>

          <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'linear-gradient(135deg,#FF6B6B,#FF8E53)',borderRadius:20,padding:'6px 16px'}}>
            <span style={{fontSize:14}}>🏫</span>
            <span style={{color:'#fff',fontWeight:800,fontSize:14}}>{classLabel}</span>
          </div>
        </div>
      )}

      {/* Peer view - read only, no interaction */}
      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,fontWeight:800,color:'#FF6B6B',marginBottom:9}}>👀 우리 반 펫 현황 <span style={{fontWeight:400,color:'#aaa',fontSize:11}}>(보기만 가능)</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          {students.map(s=>{
            const stage = getPetStage(s.xp||0, s.petType||'dog');
            return (
              <div key={s.id} className="peer-card" style={{userSelect:'none',pointerEvents:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{position:'relative',flexShrink:0}}>
                    <span style={{fontSize:30}}>{stage.emoji}</span>
                    {s.equipped?.hat && <span style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',fontSize:13}}>{getItem(s.equipped.hat)?.emoji}</span>}
                  </div>
                  <div style={{flex:1,overflow:'hidden'}}>
                    <div style={{fontWeight:800,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.petName||'?'}</div>
                    <div style={{fontSize:10,color:'#888'}}>{s.name} · {stage.name}</div>
                    <div style={{fontSize:10,color:'#FF6B6B'}}>🔥 {s.streak||0}일 연속</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{maxWidth:400,margin:'0 auto'}}>
        <div style={{display:'flex',gap:8,marginBottom:18}}>
          <button className={`btn btn-sm ${mode==='login'?'btn-primary':'btn-gray'}`} onClick={()=>{setMode('login');setErr('')}}>🔑 로그인</button>
          <button className={`btn btn-sm ${mode==='register'?'btn-primary':'btn-gray'}`} onClick={()=>{setMode('register');setErr('')}}>✨ 새로 등록</button>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>

                <div key={p.id} onClick={()=>setRPetType(p.id)}

    const diffToMon = (dow === 0) ? -6 : 1 - dow; // 월요일까지의 차이
    const monday = new Date(today);
    monday.setDate(today.getDate() + diffToMon);
    const dayLabels = ['월','화','수','목','금','토','일'];
    return Array.from({length:7}, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const ds = d.toISOString().split('T')[0];
      const isFuture = ds > todayStr();
      return {
        date: ds,
        label: dayLabels[i],
        filled: !isFuture && myRecs.some(r => r.date === ds),
        isToday: ds === todayStr(),
        isFuture,
        isWeekend: i >= 5,
      };
    });
  })();

  return (
    <div style={{background:'#FFF9F0',minHeight:'100vh'}}>
      <div className="header">
        <div>
          <h1>안녕, {student.name}! 👋</h1>
          <div style={{color:'rgba(255,255,255,.82)',fontSize:11}}>{stage.emoji} {student.petName}가 기다리고 있어요</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>

          <button onClick={onLogout} style={{background:'rgba(255,255,255,.25)',border:'none',color:'#fff',borderRadius:20,padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>나가기</button>

        {tab==='pet'   && <PetTab student={student}/>}

        {tab==='recs'  && <RecsTab myRecs={myRecs}/>}

function ShopTab({ student, onUpdateStudent, showToast }) {
  const [shopTab, setShopTab] = useState('shop');
  const inv = student.inventory || [];
  const equipped = student.equipped || {};

  const buyItem = (item) => {
    if((student.coins||0) < item.price) { showToast('코인이 부족해요! 💰'); return; }
    if(inv.includes(item.id)) { showToast('이미 가지고 있어요!'); return; }
    if(item.type==='food') {
      // food: instant XP
      onUpdateStudent(student.id, {
        xp:(student.xp||0)+item.xpBonus,
        coins:(student.coins||0)-item.price,
      });
      showToast(`${item.name} 사용! +${item.xpBonus} XP 🎉`);
      return;
    }
    onUpdateStudent(student.id, {
      inventory:[...inv, item.id],
      coins:(student.coins||0)-item.price,
    });
    showToast(`${item.name} 구매 완료! 🛒`);
  };

  const equipItem = (item) => {
    const slot = item.type;
    const newEquipped = {...equipped};
    if(newEquipped[slot]===item.id) {
      newEquipped[slot]=null;
      showToast(`${item.name} 해제!`);
    } else {
      newEquipped[slot]=item.id;
      showToast(`${item.name} 장착! ✨`);
    }
    onUpdateStudent(student.id, {equipped:newEquipped});
  };

  const byType = (type) => SHOP_ITEMS.filter(i=>i.type===type);

  return (
    <div className="fade-in">
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['shop','🛒 상점'],['inv','🎒 인벤토리']].map(([k,lb])=>(
          <button key={k} className={`btn btn-sm ${shopTab===k?'btn-primary':'btn-gray'}`} onClick={()=>setShopTab(k)}>{lb}</button>
        ))}
        <div className="coin-badge" style={{marginLeft:'auto'}}>💰 {student.coins||0} 코인</div>
      </div>

      {shopTab==='shop' && (
        <>
          {/* Preview */}
          <div className="card" style={{marginBottom:13,textAlign:'center',background:'linear-gradient(135deg,#F3E5FF,#E8F5E9)'}}>
            <div style={{fontSize:13,fontWeight:800,color:'#555',marginBottom:8}}>👁 현재 내 펫 미리보기</div>
            <PetDisplay student={student} size="lg"/>
          </div>
          {[['hat','🎩 모자'],['acc','💫 악세서리'],['bg','🌅 배경'],['food','🍎 먹이']].map(([type,lb])=>(
            <div key={type} className="card" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:11}}>{lb}</div>
              <div className="shop-grid">
                {byType(type).map(item=>{
                  const owned = inv.includes(item.id);
                  const isEquipped = equipped[item.type]===item.id;
                  return (
                    <div key={item.id} className={`shop-item ${owned?'owned':''} ${isEquipped?'equipped':''}`}
                      onClick={()=>owned?(type!=='food'&&equipItem(item)):buyItem(item)}>
                      <div style={{fontSize:32,marginBottom:5}}>{item.emoji}</div>
                      <div style={{fontWeight:800,fontSize:12,marginBottom:2}}>{item.name}</div>
                      <div style={{fontSize:10,color:'#888',marginBottom:6}}>{item.desc}</div>
                      {owned
                        ? <div style={{fontSize:11,fontWeight:800,color:isEquipped?'#A770EF':'#56AB2F'}}>{isEquipped?'✨ 장착 중':'✅ 보유 중'}</div>
                        : <div style={{fontSize:12,fontWeight:800,color:'#F7971E'}}>💰 {item.price} 코인</div>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      )}

      {shopTab==='inv' && (
        <div className="card">
          <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>🎒 내 아이템</div>
          {inv.length===0 ? (
            <div style={{textAlign:'center',padding:'30px',color:'#aaa',fontWeight:700}}>아직 아이템이 없어요!<br/>상점에서 구매해 보세요 🛒</div>
          ) : (
            <div className="shop-grid">
              {inv.map(id=>{
                const item = getItem(id);
                if(!item) return null;
                const isEquipped = equipped[item.type]===item.id;
                return (
                  <div key={id} className={`shop-item owned ${isEquipped?'equipped':''}`}
                    onClick={()=>item.type!=='food'&&equipItem(item)}>
                    <div style={{fontSize:32,marginBottom:5}}>{item.emoji}</div>
                    <div style={{fontWeight:800,fontSize:12,marginBottom:2}}>{item.name}</div>
                    {item.type!=='food' && (
                      <div style={{fontSize:11,fontWeight:800,color:isEquipped?'#A770EF':'#56AB2F'}}>{isEquipped?'✨ 장착 중':'탭하여 장착'}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   READING RECORD FORM (single page)
═══════════════════════════════════════ */
function RecordForm({ student, onSave, onBack }) {
  const [book,      setBook]      = useState('');
  const [pages,     setPages]     = useState('');
  const [scene,     setScene]     = useState('');
  const [word,      setWord]      = useState('');
  const [mood,      setMood]      = useState('');
  const [star,      setStar]      = useState(0);
  const [bonusAns,  setBonusAns]  = useState('');
  const [screenResult, setScreenResult] = useState(null);
  const [bonusQ,    setBonusQ]    = useState(null);
  const [submitted, setSubmitted] = useState(false);

  // Track which fields have issues for highlight
  const failedFields = useMemo(() => {
    if(!screenResult || screenResult.pass) return {};
    const f = {};
    if(!book || book.trim().length < SCREENING_RULES.minBookLen) f.book = true;
    if(!scene || scene.trim().length < SCREENING_RULES.minSceneLen) f.scene = true;
    const hasForbidden = SCREENING_RULES.forbiddenWords.some(w => (scene||'').includes(w));
    if(hasForbidden) f.scene = true;
    return f;
  }, [screenResult, book, scene]);

  const screening = () => {
    const result = SCREENING_RULES.check({book, scene, word});
    setScreenResult(result);
    if(result.pass) {
      const q = BONUS_QUESTIONS[Math.floor(Math.random()*BONUS_QUESTIONS.length)];
      setBonusQ(q);
    }
  };

  const canSubmit = () => mood && star > 0 && screenResult?.pass;

  const handleSave = () => {
    if(submitted) return;
    setSubmitted(true);
    onSave({book,pages,scene,word,mood,star,bonusAns});
  };

  // Issue → field label mapping for inline hints
  const fieldHints = {
    book:  '📖 책 제목을 2글자 이상 정확히 입력해 주세요',
    scene: '💭 기억에 남는 장면을 10글자 이상 구체적으로 써 주세요 (예: "주인공이 ~한 장면이 인상 깊었어요")',
    word:  '✨ 낱말을 2글자 이상 제대로 입력해 주세요 (예: 반짝반짝, 용감하다)',
  };

  return (
    <div style={{background:'#FFF9F0',minHeight:'100vh'}}>
      <div className="header">
        <button onClick={onBack} style={{background:'rgba(255,255,255,.25)',border:'none',color:'#fff',borderRadius:20,padding:'5px 13px',cursor:'pointer',fontSize:13,fontWeight:700}}>← 뒤로</button>
        <h1>독서 기록하기 📝</h1>
        <div/>
      </div>
      <div style={{padding:'18px 15px 100px'}}>

        {/* Book info */}
        <div className="card fade-in" style={{marginBottom:13,border:`2px solid ${failedFields.book?'#FF6B6B':'transparent'}`}}>
          <div style={{fontWeight:800,fontSize:16,color:'#FF6B6B',marginBottom:13}}>📖 읽은 책 정보</div>
          <label style={{fontWeight:800,fontSize:14,color:failedFields.book?'#FF6B6B':'#555',display:'block',marginBottom:6}}>
            책 제목 * {failedFields.book && <span style={{fontSize:12,fontWeight:400}}>← 수정 필요!</span>}
          </label>
          <input className="input-field" style={{marginBottom:6,borderColor:failedFields.book?'#FF6B6B':'#EBEBEB'}}
            placeholder="예) 강아지 별, 마법의 설탕" value={book}
            onChange={e=>{setBook(e.target.value);setScreenResult(null);}}/>
          {failedFields.book && (
            <div style={{fontSize:12,color:'#E65100',fontWeight:700,marginBottom:10,padding:'7px 10px',background:'#FFF3E0',borderRadius:9}}>
              ✏️ {fieldHints.book}
            </div>
          )}
          <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6,marginTop:4}}>읽은 분량</label>
          <input className="input-field" placeholder="예) 20~30쪽, 1장" value={pages} onChange={e=>setPages(e.target.value)}/>
        </div>

        {/* Content */}
        <div className="card fade-in" style={{marginBottom:13,border:`2px solid ${(failedFields.scene||failedFields.word)?'#FF6B6B':'transparent'}`}}>
          <div style={{fontWeight:800,fontSize:16,color:'#FF6B6B',marginBottom:13}}>💭 내용 기록</div>
          <label style={{fontWeight:800,fontSize:14,color:failedFields.scene?'#FF6B6B':'#555',display:'block',marginBottom:6}}>
            기억에 남는 장면 * <span style={{fontWeight:400,color:'#aaa',fontSize:12}}>(10자 이상)</span>
            {failedFields.scene && <span style={{fontSize:12,fontWeight:400,color:'#FF6B6B'}}> ← 수정 필요!</span>}
          </label>
          <textarea className="input-field" style={{marginBottom:6,borderColor:failedFields.scene?'#FF6B6B':'#EBEBEB'}}
            placeholder="예) 주인공이 처음으로 날 수 있게 된 장면이 정말 인상적이었어요." value={scene}
            onChange={e=>{setScene(e.target.value);setScreenResult(null);}}/>
          {failedFields.scene && (
            <div style={{fontSize:12,color:'#E65100',fontWeight:700,marginBottom:10,padding:'7px 10px',background:'#FFF3E0',borderRadius:9}}>
              ✏️ {fieldHints.scene}
            </div>
          )}
          <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6,marginTop:4}}>
            새로 알게 된 낱말 * <span style={{fontWeight:400,color:'#aaa',fontSize:12}}>(+{XP_TABLE.wordBonus} XP)</span>
          </label>
          <input className="input-field"
            placeholder="예) 반짝반짝, 용감하다, 봄" value={word}
            onChange={e=>{setWord(e.target.value);setScreenResult(null);}}/>
        </div>

        {/* Feeling */}
        <div className="card fade-in" style={{marginBottom:13}}>
          <div style={{fontWeight:800,fontSize:16,color:'#FF6B6B',marginBottom:13}}>😊 책을 읽고 난 느낌</div>
          <div className="mood-grid" style={{marginBottom:16}}>
            {MOODS.map(m=>(
              <div key={m.key} className={`mood-btn ${mood===m.key?'sel':''}`} onClick={()=>setMood(m.key)}>
                <div className="mood-emoji">{m.emoji}</div>
                <div className="mood-label">{m.key}</div>
              </div>
            ))}
          </div>
          <div style={{fontWeight:800,fontSize:14,color:'#555',marginBottom:9,textAlign:'center'}}>이 책은 몇 점이에요?</div>
          <div className="star-row">
            {[1,2,3,4,5].map(s=>(
              <div key={s} className={`star-item ${star>=s?'on':''}`} onClick={()=>setStar(s)}>⭐</div>
            ))}
          </div>
        </div>

        {/* Screening button */}
        {!screenResult && (
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:13}}
            disabled={!book.trim()||!scene.trim()||!word.trim()}
            onClick={screening}>🔍 기록 내용 확인하기</button>
        )}

        {/* Screening result */}
        {screenResult && (
          screenResult.pass ? (
            <div className="screening-pass fade-in" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,color:'#2d7a2d',marginBottom:4}}>✅ 훌륭한 기록이에요!</div>
              <div style={{fontSize:13,color:'#555'}}>성의 있게 작성했어요! 보너스 질문이 열렸어요 🎉</div>
            </div>
          ) : (
            <div className="screening-fail fade-in" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,color:'#E65100',marginBottom:8}}>✏️ 아래 항목을 다시 작성해 주세요!</div>
              {screenResult.issues.map((iss,i)=>(
                <div key={i} style={{fontSize:13,color:'#555',marginBottom:5,padding:'7px 11px',background:'rgba(255,255,255,.7)',borderRadius:9,borderLeft:'3px solid #FF8E53'}}>
                  ⚠️ {iss}
                </div>
              ))}
              <div style={{fontSize:12,color:'#E65100',marginTop:8,fontWeight:700}}>🔴 빨간 테두리 칸을 찾아서 수정한 뒤 다시 확인해 보세요!</div>
            </div>
          )
        )}

        {/* Re-check button after fail */}
        {screenResult && !screenResult.pass && (
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:13}}
            disabled={!book.trim()||!scene.trim()||!word.trim()}
            onClick={screening}>🔄 다시 확인하기</button>
        )}

        {/* Bonus question */}
        {screenResult?.pass && bonusQ && (
          <div className="card fade-in" style={{marginBottom:13,border:'2px solid #A770EF',background:'linear-gradient(135deg,#F3E5FF,#fff)'}}>
            <div style={{fontWeight:800,fontSize:14,color:'#A770EF',marginBottom:8}}>⭐ 보너스 질문 (+{XP_TABLE.bonusQ} XP)</div>
            <div style={{fontSize:14,color:'#333',marginBottom:9,fontWeight:700}}>{bonusQ.q}</div>
            <textarea className="input-field" placeholder={bonusQ.placeholder} value={bonusAns} onChange={e=>setBonusAns(e.target.value)} rows={3}/>
            <div style={{fontSize:11,color:'#A770EF',marginTop:5}}>✨ 작성하면 추가 {XP_TABLE.bonusQ} XP + {XP_TABLE.bonusQ} 코인!</div>
          </div>
        )}

        {/* XP preview */}
        {canSubmit() && (
          <div className="card fade-in" style={{marginBottom:13,background:'linear-gradient(135deg,#FFF9C4,#FFF3CD)',border:'1px solid #FFD700'}}>
            <div style={{fontWeight:800,fontSize:13,color:'#856404',marginBottom:6}}>🎯 예상 보상</div>
            <div style={{fontSize:13,color:'#555'}}>
              XP: <strong style={{color:'#FF6B6B'}}>+{calcXP({word,bonusAns},student.streak||0)}</strong>
              &nbsp;· 코인: <strong style={{color:'#F7971E'}}>+{calcXP({word,bonusAns},student.streak||0)}</strong> 💰
            </div>
            {(student.streak||0)>0 && <div style={{fontSize:11,color:'#856404',marginTop:3}}>🔥 {student.streak}일 연속 보너스 포함!</div>}
          </div>
        )}

        <button className="btn btn-green" style={{width:'100%',fontSize:16,padding:'15px'}}
          disabled={!canSubmit()||submitted}
          onClick={handleSave}>🎉 기록 완성!</button>
      </div>
    </div>
  );
}

function TeacherLogin({ onLogin, onBack }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(false);
  const tryLogin = () => {
    if(pw==='teacher123'||pw==='1234'||pw==='admin') onLogin();
    else { setErr(true); setTimeout(()=>setErr(false),2000); }
  };
  return (
    <div style={{background:'linear-gradient(160deg,#667eea 0%,#764ba2 100%)',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 18px'}}>
      <button onClick={onBack} style={{position:'absolute',top:18,left:18,background:'rgba(255,255,255,.2)',border:'none',color:'#fff',borderRadius:20,padding:'5px 13px',cursor:'pointer',fontSize:13,fontWeight:700}}>← 뒤로</button>
      <div style={{fontSize:56,marginBottom:14}}>👩‍🏫</div>
      <h2 style={{color:'#fff',fontSize:24,fontWeight:800,marginBottom:5}}>선생님 로그인</h2>
      <p style={{color:'rgba(255,255,255,.8)',fontSize:13,marginBottom:28}}>비밀번호를 입력해 주세요</p>
      <div className="card" style={{width:'100%',maxWidth:350}}>
        <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:7}}>비밀번호</label>
        <input className="input-field" type="password" placeholder="teacher123 또는 1234 (데모)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&tryLogin()}/>
        {err && <div style={{color:'#FF6B6B',fontSize:12,fontWeight:700,marginTop:5}}>⚠️ 비밀번호가 틀렸어요!</div>}
        <button className="btn btn-purple" style={{width:'100%',marginTop:14}} onClick={tryLogin}>🔓 로그인</button>
        <div style={{textAlign:'center',fontSize:11,color:'#aaa',marginTop:9}}>데모 비밀번호: teacher123 또는 1234</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   TEACHER DASHBOARD
═══════════════════════════════════════ */
function TeacherDashboard({ students, records, onUpdateStudent, onDeleteStudent, onLogout, classInfo, onBackToClasses }) {
  const [tab, setTab]           = useState('overview');
  const [toast, setToast]       = useState('');
  const [toastType, setToastType] = useState('success');
  const [praiseFor, setPraise]  = useState(null);
  const [coinAmount, setCoinAmount] = useState(10);
  const [classMsgVal, setClassMsg] = useState('');

  // Push notification state
  const [pushTarget, setPushTarget] = useState(null);
  const [pushMsg, setPushMsg]       = useState('');
  const [notifications, setNotifications] = useState([]);

  // Mission state
  const [missionVal, setMission]   = useState('');
  const [missionRewards, setMissionRewards] = useState({ coin:0, xp:0, badge:'' });
  const [activeMission, setActiveMission]   = useState(null);

  // Student management
  const [manageTarget, setManageTarget] = useState(null);
  const [newPw, setNewPw]               = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);

  // ── Class name ──
  const [className, setClassName]       = useState('3학년 1반');
  const [editingClass, setEditingClass] = useState(false);
  const [classNameDraft, setClassNameDraft] = useState('');

  // ── Student detail view ──
  const [detailStudent, setDetailStudent] = useState(null); // student obj to show records
  const [feedbackDrafts, setFeedbackDrafts] = useState({}); // {recordId: draftText}
  const [recordFeedbacks, setRecordFeedbacks] = useState({}); // {recordId: {text, date}}
  const [feedbackRecordId, setFeedbackRecordId] = useState(null); // which record is open for feedback input

  const openDetail = (s) => { setDetailStudent(s); setFeedbackRecordId(null); };
  const closeDetail = () => { setDetailStudent(null); setFeedbackRecordId(null); };

  const saveFeedback = (recId) => {
    const text = (feedbackDrafts[recId]||'').trim();
    if(!text) return;
    setRecordFeedbacks(prev => ({ ...prev, [recId]: { text, date: todayStr() } }));
    setFeedbackDrafts(prev => ({ ...prev, [recId]: '' }));
    setFeedbackRecordId(null);
    // Also update student's teacherMsg with latest feedback
    const rec = records.find(r=>r.id===recId);
    if(rec) onUpdateStudent(rec.sid, { teacherMsg: `📝 "${rec.book}"에 대한 선생님 피드백: ${text}` });
    showToast('📝 피드백을 저장했어요!');
  };

  const deleteFeedback = (recId) => {
    setRecordFeedbacks(prev => { const n={...prev}; delete n[recId]; return n; });
    showToast('피드백을 삭제했어요');
  };

  const showToast = (msg, type='success') => {
    setToast(msg); setToastType(type);
    setTimeout(()=>setToast(''),2800);
  };

  const td = todayStr();
  const todayCount = [...new Set(records.filter(r=>r.date===td).map(r=>r.sid))].length;
  const weekAgo    = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const weekCount  = records.filter(r=>new Date(r.date)>=weekAgo).length;
  const streak3    = students.filter(s=>(s.streak||0)>=3).length;
  const totalCoins = students.reduce((s,st)=>s+(st.coins||0),0);

  const barData  = students.map(s=>({name:(s.name||'?').slice(0,3), val:records.filter(r=>r.sid===s.id).length}));
  const moodTally = {};
  records.forEach(r=>{ if(r.mood) moodTally[r.mood]=(moodTally[r.mood]||0)+1; });
  const donutData = MOODS.map(m=>({...m, val:moodTally[m.key]||0}));
  const inactive = students.filter(s=>daysDiff(s.lastActive)>=3);
  const topStudents = [...students].sort((a,b)=>(b.total||0)-(a.total||0)).slice(0,3);

  // Praise + coin send
  const sendPraise = (sid, type) => {
    const msgs = {
      '꾸준함 칭찬':'꾸준히 읽는 모습이 정말 훌륭해요! 👏',
      '성실한 기록상':'성실하게 기록해줘서 고마워요! 📝',
      '낱말 수집가상':'낱말을 잘 찾아내는 훌륭한 독서가! ✨',
      '독서 새싹상':'독서의 씨앗이 쑥쑥 자라고 있어요! 🌱',
      '코인 선물':'선생님이 코인을 보내드려요! 💰😊',
    };
    const st = students.find(s=>s.id===sid);
    if(type==='코인 선물') {
      onUpdateStudent(sid,{
        coins:(st?.coins||0)+coinAmount,
        praises:[...(st?.praises||[]),`코인 +${coinAmount}💰`],
        teacherMsg:msgs['코인 선물'],
      });
      showToast(`${st?.name}에게 💰 ${coinAmount}코인 선물 완료!`);
    } else {
      onUpdateStudent(sid,{praises:[...(st?.praises||[]),type],teacherMsg:msgs[type]||'선생님이 응원해요! 💪'});
      showToast(`칭찬 스티커 전송 완료! 🏅`);
    }
    setPraise(null);
  };

  // Push notification send
  const sendPush = () => {
    if(!pushTarget||!pushMsg.trim()) return;
    const note = { sid:pushTarget.id, name:pushTarget.name, msg:pushMsg.trim(), date:todayStr() };
    setNotifications(p=>[note,...p]);
    onUpdateStudent(pushTarget.id, { teacherMsg:`📣 ${pushMsg.trim()}` });
    showToast(`📣 ${pushTarget.name}에게 알림을 보냈어요!`);
    setPushTarget(null); setPushMsg('');
  };

  const sendPushToAll = (msg) => {
    inactive.forEach(s => onUpdateStudent(s.id, { teacherMsg:`📣 ${msg}` }));
    const notes = inactive.map(s=>({ sid:s.id, name:s.name, msg, date:todayStr() }));
    setNotifications(p=>[...notes,...p]);
    showToast(`📣 미활동 학생 ${inactive.length}명에게 독서 독려 알림 전송!`);
  };

  // Mission set
  const setMissionActive = () => {
    if(!missionVal.trim()) { showToast('미션 내용을 입력해 주세요','warn'); return; }
    setActiveMission({ text:missionVal, rewards:missionRewards, date:todayStr() });
    showToast('📋 미션이 설정되었어요!');
  };

  // Student management
  const resetPassword = () => {
    if(!manageTarget || newPw.length < 4) return;
    onUpdateStudent(manageTarget.id, { password:newPw });
    showToast(`🔑 ${manageTarget.name} 비밀번호 초기화 완료!`);
    setManageTarget(null); setNewPw('');
  };

  const deleteStudent = () => {
    if(!manageTarget) return;
    onDeleteStudent(manageTarget.id);
    showToast(`🗑 ${manageTarget.name} 계정을 삭제했어요`);
    setManageTarget(null); setConfirmDelete(false);
  };

  return (
    <div style={{background:'#F4F6FA',minHeight:'100vh'}}>
      {/* Toast */}
      {toast && (
        <div className="notification" style={{background:toastType==='warn'?'linear-gradient(135deg,#F7971E,#FFD200)':'linear-gradient(135deg,#56AB2F,#A8E063)'}}>
          {toastType==='warn'?'⚠️':'✅'} {toast}
        </div>
      )}

      {/* ── Praise Dialog ── */}
      {praiseFor && (
        <div className="overlay">
          <div className="dialog">
            <h3 style={{fontWeight:800,fontSize:17,marginBottom:4}}>{praiseFor.name}에게 보내기 🏅</h3>
            <p style={{color:'#888',fontSize:13,marginBottom:14}}>칭찬 또는 코인을 선택하세요</p>
            {['꾸준함 칭찬','성실한 기록상','낱말 수집가상','독서 새싹상'].map(p=>(
              <button key={p} className="btn btn-yellow" style={{width:'100%',marginBottom:8}} onClick={()=>sendPraise(praiseFor.id,p)}>🏅 {p}</button>
            ))}
            <div style={{border:'2px solid #FFD200',borderRadius:13,padding:'11px',marginBottom:8}}>
              <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>💰 코인 선물</div>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
                {[5,10,20,30,50].map(n=>(
                  <button key={n} onClick={()=>setCoinAmount(n)}
                    style={{padding:'6px 12px',borderRadius:20,border:`2px solid ${coinAmount===n?'#F7971E':'#eee'}`,background:coinAmount===n?'#FFF3E0':'#fff',fontWeight:800,fontSize:13,cursor:'pointer'}}>
                    {n}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <input type="number" min={1} max={999} className="input-field" style={{flex:1,padding:'8px 12px'}}
                  value={coinAmount} onChange={e=>setCoinAmount(Math.max(1,parseInt(e.target.value)||1))}/>
                <span style={{fontWeight:800,color:'#F7971E'}}>코인</span>
              </div>
              <button className="btn btn-coin" style={{width:'100%',marginTop:8}} onClick={()=>sendPraise(praiseFor.id,'코인 선물')}>
                💰 {coinAmount}코인 보내기
              </button>
            </div>
            <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setPraise(null)}>취소</button>
          </div>
        </div>
      )}

      {/* ── Push Notification Dialog ── */}
      {pushTarget && (
        <div className="overlay">
          <div className="dialog">
            <h3 style={{fontWeight:800,fontSize:17,marginBottom:4}}>📣 {pushTarget.name}에게 독서 독려</h3>
            <p style={{color:'#888',fontSize:13,marginBottom:12}}>학생 홈 화면에 선생님 메시지로 전달돼요</p>
            <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:12}}>
              {[
                '책이 기다리고 있어요! 오늘 조금만 읽어볼까요? 📚',
                `${pushTarget.name}, 펫이 너를 기다리고 있어! 빨리 와줘 🐾`,
                '독서 3일 연속 도전! 오늘도 할 수 있어요 💪',
                '선생님이 응원해요! 오늘 기록 남기면 코인도 얻어요 💰',
              ].map((preset,i)=>(
                <div key={i} onClick={()=>setPushMsg(preset)}
                  style={{padding:'9px 12px',borderRadius:11,background:pushMsg===preset?'#FFF3E0':'#F9F9F9',border:`1.5px solid ${pushMsg===preset?'#FF8E53':'#eee'}`,cursor:'pointer',fontSize:13,fontWeight:pushMsg===preset?700:400}}>
                  {preset}
                </div>
              ))}
            </div>
            <textarea className="input-field" rows={2} placeholder="직접 메시지 입력..." value={pushMsg}
              onChange={e=>setPushMsg(e.target.value)} style={{marginBottom:10}}/>
            <button className="btn btn-primary" style={{width:'100%',marginBottom:8}} disabled={!pushMsg.trim()} onClick={sendPush}>
              📣 보내기
            </button>
            <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setPushTarget(null)}>취소</button>
          </div>
        </div>
      )}

      {/* ── Student Manage Dialog (delete / reset pw) ── */}
      {manageTarget && (
        <div className="overlay">
          <div className="dialog">
            <h3 style={{fontWeight:800,fontSize:17,marginBottom:4}}>⚙️ {manageTarget.name} 학생 관리</h3>
            <p style={{color:'#888',fontSize:12,marginBottom:14}}>{manageTarget.petName} · XP {manageTarget.xp||0} · 코인 {manageTarget.coins||0}</p>

            {/* Reset password */}
            <div style={{background:'#F0F8FF',borderRadius:13,padding:'13px',marginBottom:12}}>
              <div style={{fontWeight:800,fontSize:13,color:'#0C5460',marginBottom:8}}>🔑 비밀번호 초기화</div>

/* ═══════════════════════════════════════════════════════════
   TEACHER AUTH SCREENS
═══════════════════════════════════════════════════════════ */
function TeacherAuthScreen({ onLoggedIn }) {
  const [mode, setMode]     = useState('login'); // login | signup
  const [email, setEmail]   = useState('');
  const [pw, setPw]         = useState('');
  const [pw2, setPw2]       = useState('');
  const [err, setErr]       = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setErr(''); setLoading(true);
    try {
      if(!FB_READY) throw new Error('Firebase 설정이 필요해요. FIREBASE_CONFIG를 입력해 주세요.');
      if(!email.trim() || !pw.trim()) throw new Error('이메일과 비밀번호를 입력해 주세요');
      if(mode==='signup') {
        if(pw !== pw2) throw new Error('비밀번호가 일치하지 않아요');
        if(pw.length < 6) throw new Error('비밀번호는 6자 이상이어야 해요');
        const user = await signUpTeacher(email.trim(), pw);
        onLoggedIn(user);
      } else {
        const user = await signInTeacher(email.trim(), pw);
        onLoggedIn(user);
      }
    } catch(e) {
      const msg = e.code==='auth/user-not-found'?'등록된 이메일이 없어요':
                  e.code==='auth/wrong-password'?'비밀번호가 틀렸어요':
                  e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일이에요':
                  e.code==='auth/invalid-email'?'이메일 형식이 올바르지 않아요':
                  e.message;
      setErr(msg);
    }
    setLoading(false);
  };

  return (
    <div style={{background:'linear-gradient(160deg,#667eea 0%,#764ba2 100%)',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 18px'}}>
      <div style={{fontSize:52,marginBottom:12}}>👩‍🏫</div>
      <h2 style={{color:'#fff',fontSize:24,fontWeight:800,marginBottom:4}}>선생님 {mode==='login'?'로그인':'회원가입'}</h2>
      <p style={{color:'rgba(255,255,255,.75)',fontSize:13,marginBottom:26}}>읽기 습관 펫 키우기</p>

      {!FB_READY && (
        <div style={{background:'rgba(255,100,100,.18)',border:'1.5px solid rgba(255,150,150,.5)',borderRadius:14,padding:'12px 16px',marginBottom:18,width:'100%',maxWidth:360,fontSize:12,color:'#ffe0e0',lineHeight:1.6}}>
          ⚠️ <strong>Firebase 설정 필요</strong><br/>
          파일 상단의 <code>FIREBASE_CONFIG</code>에 Firebase 콘솔에서 발급받은 값을 입력해 주세요.<br/>
          <a href="https://console.firebase.google.com" target="_blank" style={{color:'#ffd0a0'}}>→ Firebase 콘솔 바로가기</a>
        </div>
      )}

      <div className="card" style={{width:'100%',maxWidth:360}}>
        <div style={{display:'flex',gap:8,marginBottom:18}}>
          {[['login','🔑 로그인'],['signup','✨ 회원가입']].map(([k,lb])=>(
            <button key={k} className={`btn btn-sm ${mode===k?'btn-purple':'btn-gray'}`} style={{flex:1}}
              onClick={()=>{setMode(k);setErr('')}}>{lb}</button>
          ))}
        </div>
        <label style={{fontWeight:800,fontSize:13,color:'#555',display:'block',marginBottom:6}}>이메일</label>
        <input className="input-field" style={{marginBottom:12}} type="email" placeholder="teacher@school.kr"
          value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        <label style={{fontWeight:800,fontSize:13,color:'#555',display:'block',marginBottom:6}}>비밀번호</label>
        <input className="input-field" style={{marginBottom:mode==='signup'?12:0}} type="password" placeholder="6자 이상"
          value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        {mode==='signup' && <>
          <label style={{fontWeight:800,fontSize:13,color:'#555',display:'block',marginBottom:6}}>비밀번호 확인</label>
          <input className="input-field" type="password" placeholder="비밀번호 재입력"
            value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </>}
        {err && <div style={{color:'#FF6B6B',fontSize:12,fontWeight:700,marginTop:10,padding:'8px 12px',background:'#FFF0F0',borderRadius:10}}>⚠️ {err}</div>}
        <button className="btn btn-purple" style={{width:'100%',marginTop:16}} disabled={loading} onClick={submit}>
          {loading ? '처리 중...' : mode==='login'?'🔓 로그인':'🎉 회원가입'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   CLASS SELECTOR  (선생님이 학급 선택/생성하는 화면)
═══════════════════════════════════════════════════════════ */
function ClassSelectorScreen({ teacher, onSelectClass, onLogout }) {
  const [classes, setClasses]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [newName, setNewName]   = useState('');
  const [creating, setCreating] = useState(false);
  const [deleting, setDeleting] = useState(null);
  const [editId, setEditId]     = useState(null);
  const [editName, setEditName] = useState('');
  const [toast, setToast]       = useState('');

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  useEffect(()=>{
    if(!FB_READY) { setLoading(false); return; }
    getClasses(teacher.uid).then(list => { setClasses(list); setLoading(false); });
  }, []);

  const handleCreate = async () => {
    const name = newName.trim();
    if(!name) return;
    setCreating(true);
    try {
      const code = makeCode();
      const ref = await col('teachers', teacher.uid, 'classes').add({ name, createdAt: Date.now(), code });
      await registerCode(code, teacher.uid, ref.id, name);
      const newClass = { id: ref.id, name, code };
      setClasses(p => [...p, newClass]);
      setNewName('');
      showToast(`"${name}" 학급이 생성됐어요! 🎉`);
    } catch(e) { showToast('학급 생성 실패: '+e.message); }
    setCreating(false);
  };

  const handleDelete = async (cls) => {
    if(!window.confirm(`"${cls.name}" 학급을 삭제할까요? 모든 학생·기록이 사라져요.`)) return;
    await deleteClass(teacher.uid, cls.id);
    setClasses(p => p.filter(c => c.id !== cls.id));
    showToast(`"${cls.name}" 학급을 삭제했어요`);
  };

  const handleRename = async (cls) => {
    if(!editName.trim()) return;
    await updateClassName(teacher.uid, cls.id, editName.trim());
    setClasses(p => p.map(c => c.id===cls.id?{...c,name:editName.trim()}:c));
    setEditId(null); setEditName('');
    showToast('학급 이름을 변경했어요 ✏️');
  };

  return (
    <div style={{background:'linear-gradient(160deg,#667eea 0%,#764ba2 100%)',minHeight:'100vh',padding:'28px 18px'}}>
      {toast && <div className="notification">{toast}</div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <div style={{color:'rgba(255,255,255,.8)',fontSize:12}}>👩‍🏫 {teacher.email}</div>
          <h1 style={{color:'#fff',fontSize:22,fontWeight:900,fontFamily:'Gaegu,sans-serif'}}>내 학급 목록</h1>
        </div>
        <button onClick={onLogout} style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',borderRadius:20,padding:'6px 14px',cursor:'pointer',fontSize:12,fontWeight:700}}>로그아웃</button>
      </div>

      {/* Create new class */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>➕ 새 학급 만들기</div>
        <div style={{display:'flex',gap:8}}>
          <input className="input-field" style={{flex:1}} placeholder="예) 3학년 1반, 독서왕반"
            value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleCreate()}/>
          <button className="btn btn-primary btn-sm" disabled={!newName.trim()||creating} onClick={handleCreate}>
            {creating?'생성 중...':'만들기'}
          </button>
        </div>
      </div>

      {/* Class list */}
      {loading ? (
        <div style={{textAlign:'center',padding:40,color:'rgba(255,255,255,.7)',fontWeight:700}}>학급 불러오는 중...</div>
      ) : classes.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{fontSize:48,marginBottom:12}}>🏫</div>
          <div style={{fontWeight:700,color:'#aaa'}}>아직 학급이 없어요.<br/>위에서 첫 번째 학급을 만들어 보세요!</div>
        </div>
      ) : classes.map(cls=>(
        <div key={cls.id} className="card" style={{marginBottom:12}}>
          {editId===cls.id ? (
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input className="input-field" style={{flex:1,padding:'8px 12px'}} value={editName}
                onChange={e=>setEditName(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')handleRename(cls);if(e.key==='Escape')setEditId(null);}}
                autoFocus/>
              <button className="btn btn-sm btn-secondary" onClick={()=>handleRename(cls)}>✓</button>
              <button className="btn btn-sm btn-gray" onClick={()=>setEditId(null)}>✕</button>
            </div>
          ) : (
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16}}>{cls.name}</div>
                <div style={{fontSize:11,color:'#aaa',marginTop:2}}>
                  학급 코드: <strong style={{color:'#667eea',letterSpacing:2}}>{cls.code||'—'}</strong>
                  <span style={{marginLeft:6,color:'#bbb'}}>· 학생이 이 코드로 입장해요</span>
                </div>
              </div>
              <button className="btn btn-sm btn-gray" onClick={()=>{setEditId(cls.id);setEditName(cls.name);}}>✏️</button>
              <button className="btn btn-sm" style={{background:'#ffe0e0',color:'#e74c3c'}} onClick={()=>handleDelete(cls)}>🗑</button>
            </div>
          )}
          <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>onSelectClass(cls)}>
            📋 {cls.name} 대시보드 열기
          </button>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   STUDENT CLASS JOIN SCREEN  (학급 코드로 입장)
═══════════════════════════════════════════════════════════ */
function StudentClassJoinScreen({ onJoined, onBack }) {
  const [code, setCode]       = useState('');
  const [err, setErr]         = useState('');
  const [loading, setLoading] = useState(false);

  const tryJoin = async () => {
    const trimmed = code.trim().toUpperCase();
    if(trimmed.length < 4) { setErr('학급 코드를 입력해 주세요'); return; }
    setErr(''); setLoading(true);
    try {
      if(!FB_READY) throw new Error('Firebase 설정이 필요해요');
      const res = await resolveCode(trimmed);
      if(!res) throw new Error('학급 코드를 찾을 수 없어요. 다시 확인해 주세요!');
      onJoined({ uid: res.uid, classId: res.classId, className: res.className, code: trimmed });
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div style={{background:'linear-gradient(160deg,#FFF5E4,#FFE5CC)',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 18px'}}>
      <button onClick={onBack} style={{position:'absolute',top:18,left:18,background:'none',border:'none',fontSize:22,cursor:'pointer'}}>←</button>
      <div className="float-anim" style={{fontSize:70,marginBottom:10}}>🐣</div>
      <h2 style={{fontSize:22,fontWeight:900,color:'#FF6B6B',marginBottom:4,fontFamily:'Gaegu,sans-serif'}}>학급 코드 입력</h2>
      <p style={{color:'#999',fontSize:13,marginBottom:28,textAlign:'center'}}>선생님께 받은 6자리 코드를 입력하세요</p>
      <div className="card" style={{width:'100%',maxWidth:340}}>
        <input className="input-field" style={{textAlign:'center',fontSize:22,fontWeight:800,letterSpacing:6,textTransform:'uppercase',marginBottom:14}}
          placeholder="예) AB12CD" maxLength={8}
          value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
          onKeyDown={e=>e.key==='Enter'&&tryJoin()}/>
        {err && <div style={{color:'#FF6B6B',fontSize:12,fontWeight:700,marginBottom:10,textAlign:'center'}}>⚠️ {err}</div>}
        <button className="btn btn-primary" style={{width:'100%'}} disabled={!code.trim()||loading} onClick={tryJoin}>
          {loading?'확인 중...':'🚀 입장하기'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP ROOT  (Firebase 연동 버전)
═══════════════════════════════════════════════════════════ */
function App() {
  /* ── screens:
     'start' | 'studentClassJoin' | 'studentLogin' | 'home' | 'record' | 'reward'
     'teacherAuth' | 'classSelector' | 'teacher'
  ── */
  const [screen,      setScreen]      = useState('start');
  const [students,    setStudents]    = useState([]);
  const [records,     setRecords]     = useState([]);
  const [user,        setUser]        = useState(null);     // logged-in student obj
  const [teacher,     setTeacher]     = useState(null);     // Firebase auth user
  const [activeClass, setActiveClass] = useState(null);     // {id, name, uid, code}
  const [toast,       setToast]       = useState('');
  const [reward,      setReward]      = useState(null);
  const [fbLoading,   setFbLoading]   = useState(false);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2800); };

  /* ── Restore Firebase auth session on load ── */
  useEffect(()=>{
    if(!FB_READY) return;
    const unsub = fbAuth.onAuthStateChanged(async fbUser => {
      if(fbUser) {
        setTeacher(fbUser);
        // don't auto-navigate; let teacher pick class
      }
    });
    return unsub;
  }, []);

  /* ── Load class data when activeClass changes ── */
  useEffect(()=>{
    if(!activeClass) return;
    if(!FB_READY) return;
    setFbLoading(true);
    Promise.all([
      getStudents(activeClass.uid, activeClass.id),
      getRecords(activeClass.uid, activeClass.id),
    ]).then(([sts, rcs]) => {
      setStudents(sts);
      setRecords(rcs);
      setFbLoading(false);
    }).catch(e => { showToast('데이터 로딩 실패: '+e.message); setFbLoading(false); });
  }, [activeClass]);

  /* ── keep logged-in student in sync with students array ── */
  useEffect(()=>{
    if(user) {
      const fresh = students.find(s=>s.id===user.id);
      if(fresh) setUser(fresh);
    }
  }, [students]);

  /* ── DEMO fallback: when Firebase not configured, use local state ── */
  const isDemoMode = !FB_READY;

  /* ── Student: join class by code ── */
  const handleStudentJoinClass = async ({ uid, classId, className, code }) => {
    if(FB_READY) {
      setActiveClass({ id: classId, uid, name: className, code });
    }
    setScreen('studentLogin');
  };

  /* ── Student: login ── */
  const handleStudentLogin = async (s) => {
    const fresh = students.find(st=>st.id===s.id) || s;
    setUser(fresh);
    setScreen('home');
  };

  /* ── Student: register ── */
  const handleStudentRegister = async ({ name, password, petName, petType }) => {
    const num = `${students.length+1}번`;
    const data = {
      name, num, xp:0, streak:0, total:0, coins:0,
      lastActive: todayStr(), petName, petType: petType||'dog',
      teacherMsg: '환영해요! 독서 여행을 시작해볼까요? 🌟',
      praises:[], password,
      inventory:[], equipped:{hat:null,acc:null,bg:null},
      screeningFails:0,
    };
    let newStudent;
    if(FB_READY && activeClass) {
      newStudent = await addStudent(activeClass.uid, activeClass.id, data);
    } else {
      newStudent = { id: Date.now().toString(), ...data };
      setStudents(p=>[...p, newStudent]);
    }
    setUser(newStudent);
    setStudents(p=>[...p.filter(s=>s.id!==newStudent.id), newStudent]);
    setScreen('home');
    showToast(`${name} 학생 등록 완료! 🎉`);
  };

  /* ── Student: save record ── */
  const handleSaveRecord = async (form) => {
    const prevBadges = getBadges(user);
    const prevStage  = getPetStage(user.xp||0, user.petType||'dog');
    const xpEarned   = calcXP(form, user.streak||0);
    const coinsEarned= xpEarned;
    const newXP      = (user.xp||0) + xpEarned;
    const newStage   = getPetStage(newXP, user.petType||'dog');
    const evolved    = newStage.stage > prevStage.stage;
    const recData = {
      sid: user.id, date: todayStr(),
      book:form.book||'', pages:form.pages||'', scene:form.scene||'',
      word:form.word||'', mood:form.mood||'', star:form.star||0,
      bonusAns:form.bonusAns||'', xp:xpEarned, coins:coinsEarned,
    };
    const stuUpdates = {
      xp:newXP, streak:(user.streak||0)+1, total:(user.total||0)+1,
      coins:(user.coins||0)+coinsEarned, lastActive:todayStr(),
    };
    let newRec;
    if(FB_READY && activeClass) {
      [newRec] = await Promise.all([
        addRecord(activeClass.uid, activeClass.id, recData),
        updateStudent(activeClass.uid, activeClass.id, user.id, stuUpdates),
      ]);
    } else {
      newRec = { id: Date.now().toString(), ...recData };
    }
    const updatedStudent = { ...user, ...stuUpdates };
    const newBadges = getBadges(updatedStudent).filter(b=>!prevBadges.find(p=>p.id===b.id));
    setRecords(p=>[newRec,...p]);
    setStudents(p=>p.map(s=>s.id===user.id?updatedStudent:s));
    setUser(updatedStudent);
    setReward({ xpEarned, coinsEarned, newBadges, evolved });
    setScreen('reward');
  };

  /* ── Shared: update student ── */
  const handleUpdateStudent = async (id, updates) => {
    if(FB_READY && activeClass) {
      await updateStudent(activeClass.uid, activeClass.id, id, updates);
    }
    setStudents(p=>p.map(s=>s.id===id?{...s,...updates}:s));
    if(user?.id===id) setUser(p=>p?{...p,...updates}:p);
  };

  /* ── Teacher: delete student ── */
  const handleDeleteStudent = async (id) => {
    if(FB_READY && activeClass) {
      await deleteStudent(activeClass.uid, activeClass.id, id);
    }
    setStudents(p=>p.filter(s=>s.id!==id));
    setRecords(p=>p.filter(r=>r.sid!==id));
  };

  /* ── Teacher: login ── */
  const handleTeacherLoggedIn = (fbUser) => {
    setTeacher(fbUser);
    setScreen('classSelector');
  };

  /* ── Teacher: select class → dashboard ── */
  const handleSelectClass = (cls) => {
    setActiveClass({ ...cls, uid: teacher.uid });
    setScreen('teacher');
  };

  /* ── Teacher: logout ── */
  const handleTeacherLogout = async () => {
    if(FB_READY) await signOutTeacher();
    setTeacher(null); setActiveClass(null);
    setStudents([]); setRecords([]);
    setScreen('start');
  };

  /* ── Loading overlay ── */
  if(fbLoading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#FFF9F0',flexDirection:'column',gap:16}}>
      <div className="float-anim" style={{fontSize:60}}>🐣</div>
      <div style={{fontWeight:800,color:'#FF6B6B',fontSize:16}}>학급 데이터 불러오는 중...</div>
    </div>
  );

  return (
    <>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}

      {screen==='start' && (
        <StartScreen
          onStudent={()=>{ if(FB_READY) setScreen('studentClassJoin'); else setScreen('studentLogin'); }}
          onTeacher={()=>{ if(FB_READY && teacher) setScreen('classSelector'); else setScreen('teacherAuth'); }}/>
      )}

      {screen==='studentClassJoin' &&
        <StudentClassJoinScreen onJoined={handleStudentJoinClass} onBack={()=>setScreen('start')}/>}

      {screen==='studentLogin' &&
        <StudentLogin
          students={students}
          classLabel={activeClass?.name}
          onLogin={handleStudentLogin}
          onRegister={handleStudentRegister}
          onBack={()=>setScreen(FB_READY?'studentClassJoin':'start')}/>}

      {screen==='home' && user &&
        <StudentHome student={user} students={students} records={records}
          onRecord={()=>setScreen('record')}
          onLogout={()=>{setUser(null);setScreen('start');}}
          onUpdateStudent={handleUpdateStudent} showToast={showToast}/>}

      {screen==='record' && user &&
        <RecordForm student={user} onSave={handleSaveRecord} onBack={()=>setScreen('home')}/>}

      {screen==='reward' && user && reward &&
        <RewardScreen student={user} xpEarned={reward.xpEarned||5} coinsEarned={reward.coinsEarned||5}
          newBadges={reward.newBadges||[]} evolved={reward.evolved||false} onDone={()=>setScreen('home')}/>}

      {screen==='teacherAuth' &&
        <TeacherAuthScreen onLoggedIn={handleTeacherLoggedIn}/>}

      {screen==='classSelector' && teacher &&
        <ClassSelectorScreen teacher={teacher} onSelectClass={handleSelectClass} onLogout={handleTeacherLogout}/>}

      {screen==='teacher' && activeClass &&
        <TeacherDashboard
          students={students} records={records}
          classInfo={activeClass}
          onUpdateStudent={handleUpdateStudent}
          onDeleteStudent={handleDeleteStudent}
          onBackToClasses={()=>setScreen('classSelector')}
          onLogout={handleTeacherLogout}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
