<body>
<div id="root"></div>
<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG
   ⚠️  Firebase 콘솔에서 발급받은 값으로 교체해 주세요.

   [Firestore 보안 규칙] - 아래 내용으로 설정하세요:
   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       match /teachers/{uid}/{document=**} {
         allow read, write: if request.auth != null && request.auth.uid == uid;
       }
       // 학생 목록: 누구나 읽기, 쓰기도 허용 (학생 XP/코인 업데이트용)
       match /teachers/{uid}/classes/{classId}/students/{studentId} {
         allow read, write: if true;
       }
       // 기록: 누구나 읽기/쓰기 (학생 기록 저장용)
       match /teachers/{uid}/classes/{classId}/records/{recordId} {
         allow read, write: if true;
       }
       // 학교 디렉터리: 누구나 읽기, 선생님만 쓰기
       match /schools/{schoolId} {
         allow read: if true;
         allow write: if request.auth != null;
       }
     }
   }
═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrZuHqssiCJCpV5mh6hlvH1kPk8sCSI6w",
  authDomain: "mypet-readinghabbit.firebaseapp.com",
  projectId: "mypet-readinghabbit",
  storageBucket: "mypet-readinghabbit.firebasestorage.app",
  messagingSenderId: "402856879124",
  appId: "1:402856879124:web:81152517c0fe65182c3301",
  measurementId: "G-P8VJ80G538"
};

let fbApp, fbAuth, fbDb;
let FB_READY = false;

function initFirebase() {
  try {
    if (!firebase.apps.length) {
      fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
    } else {
      fbApp  = firebase.app();
    }
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
    FB_READY = true;
  } catch(e) {
    console.warn('Firebase init failed – running in DEMO mode', e);
    FB_READY = false;
  }
}
initFirebase();

/* ── Firestore path helpers ──
   /teachers/{uid}/
   /teachers/{uid}/classes/{classId}/
   /teachers/{uid}/classes/{classId}/students/{studentId}
   /teachers/{uid}/classes/{classId}/records/{recordId}
*/
const col  = (...parts) => fbDb.collection(parts.join('/'));
const doc  = (...parts) => fbDb.doc(parts.join('/'));

/* ── Auth helpers ── */
async function signUpTeacher(email, password) {
  const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
  await doc('teachers', cred.user.uid).set({ email, createdAt: Date.now() });
  return cred.user;
}
async function signInTeacher(email, password) {
  const cred = await fbAuth.signInWithEmailAndPassword(email, password);
  return cred.user;
}
async function signOutTeacher() { await fbAuth.signOut(); }

/* ── Class CRUD ── */
async function createClass(uid, name) {
  const ref = await col('teachers', uid, 'classes').add({ name, createdAt: Date.now(), code: makeCode() });
  return { id: ref.id, name };
}
async function getClasses(uid) {
  const snap = await col('teachers', uid, 'classes').get();
  return snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
}
async function deleteClass(uid, classId) {
  // delete students & records subcollections first
  const sts = await col('teachers', uid, 'classes', classId, 'students').get();
  const rcs = await col('teachers', uid, 'classes', classId, 'records').get();
  const batch = fbDb.batch();
  sts.docs.forEach(d => batch.delete(d.ref));
  rcs.docs.forEach(d => batch.delete(d.ref));
  batch.delete(doc('teachers', uid, 'classes', classId));
  await batch.commit();
}
async function updateClassName(uid, classId, name) {
  await doc('teachers', uid, 'classes', classId).update({ name });
}

/* ── Student CRUD ── */
async function getStudents(uid, classId) {
  const snap = await col('teachers', uid, 'classes', classId, 'students').get();
  return snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b) => parseInt(a.num||'99') - parseInt(b.num||'99'));
}
async function addStudent(uid, classId, data) {
  const ref = await col('teachers', uid, 'classes', classId, 'students').add(data);
  return { id: ref.id, ...data };
}
async function updateStudent(uid, classId, studentId, updates) {
  await doc('teachers', uid, 'classes', classId, 'students', studentId).update(updates);
}
async function deleteStudent(uid, classId, studentId) {
  const recs = await col('teachers', uid, 'classes', classId, 'records')
    .where('sid', '==', studentId).get();
  const batch = fbDb.batch();
  recs.docs.forEach(d => batch.delete(d.ref));
  batch.delete(doc('teachers', uid, 'classes', classId, 'students', studentId));
  await batch.commit();
}

/* ── Records CRUD ── */
async function getRecords(uid, classId) {
  // 최대 2회 재시도
  for(let attempt = 1; attempt <= 2; attempt++) {
    try {
      const snap = await col('teachers', uid, 'classes', classId, 'records').get();
      return snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a,b) => (b.date||'').localeCompare(a.date||''));
    } catch(e) {
      console.warn(`getRecords 시도 ${attempt} 실패:`, e.message);
      if(attempt < 2) await new Promise(r => setTimeout(r, 600));
      else throw e;
    }
  }
}
async function addRecord(uid, classId, data) {
  const ref = await col('teachers', uid, 'classes', classId, 'records').add(data);
  return { id: ref.id, ...data };
}
async function updateRecord(uid, classId, recordId, updates) {
  await doc('teachers', uid, 'classes', classId, 'records', recordId).update(updates);
}
async function deleteRecord(uid, classId, recordId) {
  await doc('teachers', uid, 'classes', classId, 'records', recordId).delete();
}

/* ── School registry ──
   /schools/{schoolId} → {name, sido, sigungu}
   /schools/{schoolId}/classes/{classId} → {grade, classNum, teacherUid, teacherClassId}
*/
async function searchSchools(query) {
  const snap = await fbDb.collection('schools').get();
  // 공백 제거 후 비교 — "삼리 초등학교" → "삼리초등학교" 처리
  const q = query.trim().replace(/\s/g,'').toLowerCase();
  // schools 컬렉션에서 고유 학교명만 추출 (학년/반 중복 제거)
  const seen = new Set();
  const results = [];
  snap.docs
    .map(d=>({id:d.id,...d.data()}))
    .forEach(d=>{
      const name = (d.name||'').replace(/\s/g,'').toLowerCase();
      if(name.includes(q) && !seen.has(d.name)) {
        seen.add(d.name);
        results.push({id:d.id, name:d.name});
      }
    });
  return results.slice(0,10);
}
async function getSchoolClasses(schoolId) {
  const snap = await fbDb.collection('schools').doc(schoolId)
    .collection('classes').get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
/* ── 미션 저장/불러오기 ── */
async function saveMission(uid, classId, mission) {
  await doc('teachers', uid, 'classes', classId).update({ activeMission: mission });
}
async function clearMission(uid, classId) {
  await doc('teachers', uid, 'classes', classId).update({ activeMission: null });
}
async function getMission(uid, classId) {
  const snap = await doc('teachers', uid, 'classes', classId).get();
  return snap.exists ? (snap.data().activeMission || null) : null;
}
async function registerSchoolClass(uid, classId, schoolName, grade, classNum) {
  // 학교 등록 (없으면 생성)
  const schoolRef = fbDb.collection('schools').doc(`${schoolName}_${grade}_${classNum}`);
  await schoolRef.set({ name:schoolName, grade, classNum, teacherUid:uid, teacherClassId:classId }, { merge:true });
  // 선생님 학급에도 학교 정보 저장
  await doc('teachers', uid, 'classes', classId).update({ schoolName, grade, classNum,
    schoolKey:`${schoolName}_${grade}_${classNum}` });
}

/* ── 4자리 개인 코드 생성 (학급 내 중복 없이) ── */
function makePersonalCode(existingCodes) {
  let code, attempts = 0;
  do {
    code = String(Math.floor(1000 + Math.random() * 9000)); // 1000~9999
    attempts++;
  } while(existingCodes.includes(code) && attempts < 1000);
  return code;
}

/* ── 일괄 학생 등록 ── */
async function bulkAddStudents(uid, classId, parsedList) {
  // parsedList: [{num, name}, ...]
  const existing = await getStudents(uid, classId);
  const existingCodes = existing.map(s=>s.personalCode||'');
  const existingNames = existing.map(s=>s.name);

  // 기존 최대 번호 계산 (없으면 0)
  const maxExistingNum = existing.reduce((max, s) => {
    const n = parseInt(s.num||'0');
    return isNaN(n) ? max : Math.max(max, n);
  }, 0);

  const batch = fbDb.batch();
  const added = [];
  let autoNum = maxExistingNum + 1; // 번호 미입력 시 자동 부여

  for(const item of parsedList) {
    const name = typeof item === 'string' ? item.trim() : item.name?.trim();
    const inputNum = typeof item === 'string' ? '' : (item.num||'').trim();
    if(!name || existingNames.includes(name)) continue;

    // 번호: 입력값 있으면 그대로, 없으면 자동 부여
    const num = inputNum ? `${inputNum}번` : `${autoNum}번`;
    if(!inputNum) autoNum++;

    const code = makePersonalCode([...existingCodes, ...added.map(a=>a.personalCode)]);
    const data = {
      name, num, xp:0, streak:0, total:0, coins:0,
      lastActive:'', petName:null, petType:null,
      teacherMsg:'환영해요! 독서 여행을 시작해볼까요? 🌟',
      praises:[], personalCode:code,
      inventory:[], equipped:{hat:null,acc:null,bg:null}, screeningFails:0,
    };
    const ref = col('teachers',uid,'classes',classId,'students').doc();
    batch.set(ref, data);
    added.push({id:ref.id, ...data});
    existingCodes.push(code);
  }
  await batch.commit();
  return added;
}

/* ── 학교/학년/반으로 학급 찾기 (학생 접속용) ── */
async function findClassBySchool(schoolName, grade, classNum) {
  const key = `${schoolName}_${grade}_${classNum}`;
  const snap = await fbDb.collection('schools').doc(key).get();
  if(!snap.exists) return null;
  const d = snap.data();
  return { uid:d.teacherUid, classId:d.teacherClassId, schoolName, grade, classNum };
}

  const h = new Date().getHours();
  if(h < 7)  return '이른 아침부터 독서하러 왔구나! 🌙';
  if(h < 10) return '굿모닝! 오늘 하루도 힘내자 ☀️';
  if(h < 13) return '오전에 책 읽으면 집중이 잘 돼!';
  if(h < 17) return '오늘 기록 아직 안 남겼지? 같이 읽자 📖';
  if(h < 20) return '오늘 하루도 수고했어! 책 한 장 어때? 🌿';
  return '늦은 시간까지 독서하러 왔구나, 대단해! 🌙';
};
const getCheer = (student) => {
  const xp = student?.xp || 0;
  const streak = student?.streak || 0;
  // 연속 기록 특별 멘트
  if(streak >= 7) return `${streak}일 연속 독서! 진짜 대단해! 🔥`;
  if(streak >= 3) return `${streak}일 연속이야! 이 기세 유지하자 💪`;
  // 시간대 멘트 (20% 확률)
  if(Math.random() < 0.2) return CHEERS_TIME();
  // XP 구간별 멘트
  const level = xp < 15 ? 0 : xp < 50 ? 1 : xp < 100 ? 2 : xp < 200 ? 3 : 4;
  const pool = CHEERS_BY_LEVEL[level];
  return pool[Math.floor(Math.random() * pool.length)];
};

const getPetStage = (xp, petType) => {
  const lib = PET_LIBRARY[petType] || PET_LIBRARY.dog;
  return lib.stages.find(s => (xp||0) >= s.minXP && (xp||0) <= s.maxXP) || lib.stages[lib.stages.length-1];
};
const getAllStages = (petType) => (PET_LIBRARY[petType] || PET_LIBRARY.dog).stages;
const getBadges = st => BADGES.filter(b => b.cond(st));
// 한국 시간(UTC+9) 기준 자정(00시) 날짜 리셋
const todayStr = () => {
  const now = new Date();
  // UTC+9 오프셋 적용
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const y = kst.getUTCFullYear();
  const m = String(kst.getUTCMonth()+1).padStart(2,'0');
  const d = String(kst.getUTCDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
};
const fmtDate = d => { if(!d) return '-'; const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const daysDiff = d => { if(!d) return 99; return Math.round((Date.now() - new Date(d)) / 86400000); };
const getItem = id => SHOP_ITEMS.find(i => i.id === id);
const calcXP = (form, streak) => {
  let xp = XP_TABLE.base;
  xp += XP_TABLE.streakBonus(streak||0);
  if(form.word?.trim()) xp += XP_TABLE.wordBonus;
  if(form.bonusAns?.trim()) xp += XP_TABLE.bonusQ;
  xp += XP_TABLE.sceneBonus(form.scene).xp;
  return xp;
};
const calcCoins = (form, streak) => {
  let coins = calcXP(form, streak); // 기본 코인 = XP와 동일
  // 장면 보너스 코인은 별도로 이미 calcXP에 포함되지 않으므로 추가
  // coins는 xp와 같게 유지 (기존 coinPerXP=1 정책)
  return coins;
};

function XPBar({ xp, petType }) {
  const stage = getPetStage(xp, petType);
  const allStages = getAllStages(petType);
  const next = allStages.find(s => s.stage === stage.stage + 1);
  const inStage = (xp||0) - stage.minXP;
  const need = next ? next.minXP - stage.minXP : 1;
  const pct = next ? Math.min(100, Math.round(inStage/need*100)) : 100;
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#aaa',marginBottom:4}}>
        <span>XP {xp||0}</span>
        {next ? <span>{next.name}까지 {need-inStage} XP</span> : <span>최고 단계! 🏆</span>}
      </div>
      <div className="progress-outer"><div className="progress-inner" style={{width:`${pct}%`}}/></div>
    </div>
  );
}

function SvgDefs() {
  return (
    <svg width="0" height="0" style={{position:'absolute'}}>
      <defs>
        <filter id="petShadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="4" stdDeviation="4" floodColor="rgba(0,0,0,0.18)"/>
        </filter>
        <filter id="petGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="groundGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="rgba(0,0,0,0.12)"/>
          <stop offset="100%" stopColor="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>
    </svg>
  );
}

/* ── blink hook ── */
function useBlink() {
  const [blink, setBlink] = useState(false);
  useEffect(() => {
    const schedule = () => {
      const delay = 2500 + Math.random() * 3000;
      return setTimeout(() => {
        setBlink(true);
        setTimeout(() => { setBlink(false); schedule(); }, 130);
      }, delay);
    };
    const t = schedule();
    return () => clearTimeout(t);
  }, []);
  return blink;
}

/* ── Eye shape helper ── */
function Eye({ cx, cy, r=5, blink=false, color='#2d1a0e', shine=true }) {
  return (
    <g>
      <ellipse cx={cx} cy={cy} rx={r} ry={blink ? 0.8 : r} fill={color} style={{transition:'ry .06s'}}/>
      {shine && !blink && <circle cx={cx+r*0.35} cy={cy-r*0.35} r={r*0.28} fill="rgba(255,255,255,0.85)"/>}
    </g>
  );
}

  bird: PetSvg_Bird, dragon: PetSvg_Dragon, hamster: PetSvg_Hamster,

/* ── Animated Pet Display ── */
function PetDisplay({ student, size='lg', showItems=true }) {
  const petType = student?.petType || 'dog';
  const xp = student?.xp || 0;
  const stage = getPetStage(xp, petType);
  const equipped = student?.equipped || {};
  const hatEmoji = equipped.hat ? getItem(equipped.hat)?.emoji : null;
  const accEmoji = equipped.acc ? getItem(equipped.acc)?.emoji : null;
  const bgItem = equipped.bg ? getItem(equipped.bg) : null;
  const blink = useBlink();

  const SvgComponent = PET_SVG_MAP[petType] || PetSvg_Dog;
  const bgStyle = bgItem
    ? { background: bgItem.bgColor || stage.color }
    : { background: `linear-gradient(160deg,${stage.color} 0%,#fff 100%)` };

  const sz = size === 'lg' ? 160 : size === 'md' ? 80 : 48;

  if(size === 'sm') {
    // sm: still use emoji for tiny contexts (teacher dashboard etc)
    return <span style={{fontSize:32}}>{stage.emoji}</span>;
  }

  return (
    <div style={{position:'relative',display:'inline-block',lineHeight:1}}>
      <SvgDefs/>
      {size === 'lg' && (
        <div style={{...bgStyle,borderRadius:26,padding:'18px 24px',textAlign:'center',boxShadow:'0 6px 28px rgba(0,0,0,.12)',position:'relative',overflow:'hidden'}}>
          {/* bg shimmer for high level */}
          {stage.stage >= 7 && (
            <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(255,255,255,0) 40%,rgba(255,255,255,0.25) 50%,rgba(255,255,255,0) 60%)',backgroundSize:'200% 200%',animation:'shimmer 2.5s linear infinite',pointerEvents:'none'}}/>
          )}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
            {showItems && hatEmoji && (
              <div style={{fontSize:sz*0.28,lineHeight:1,marginBottom:'-8px',zIndex:2,animation:'bounce 2s infinite'}}>{hatEmoji}</div>
            )}
            <div className="float-anim" style={{lineHeight:1}}>
              <SvgComponent
                stage={stage} blink={blink}
                hat={showItems&&hatEmoji?null:null}
                acc={showItems&&accEmoji?accEmoji:null}
                bgColor={bgItem?.bgColor}
                size={sz}/>
            </div>
            {showItems && accEmoji && !['hat'].includes(getItem(equipped.acc)?.type) && (
              <div style={{fontSize:sz*0.22,marginTop:'-6px',animation:'heartbeat 2s infinite'}}>{accEmoji}</div>
            )}
          </div>
        </div>
      )}
      {size === 'md' && (
        <div style={{position:'relative',textAlign:'center',animation:'breathe 3s ease-in-out infinite'}}>
          <SvgComponent stage={stage} blink={blink} hat={showItems?hatEmoji:null} acc={showItems?accEmoji:null} size={sz}/>
        </div>
      )}
    </div>
  );
}

/* ── Book Block Chart (기록 수만큼 책 블록) ── */
function BookBlockChart({ data, onClickStudent }) {
  const [sortBy, setSortBy] = useState('num'); // num | name | high | low
  const sorted = useMemo(() => {
    const d = [...data];
    if(sortBy==='num')  return d.sort((a,b)=> parseInt(a.num||'99')-parseInt(b.num||'99'));
    if(sortBy==='name') return d.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
    if(sortBy==='high') return d.sort((a,b)=> b.val-a.val);
    if(sortBy==='low')  return d.sort((a,b)=> a.val-b.val);
    return d;
  }, [data, sortBy]);

  const BOOK = '📚';
  const MAX_SHOW = 20; // 블록 너무 많으면 숫자로 대체

  return (
    <div>
      {/* 정렬 버튼 */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {[['num','번호순'],['name','가나다순'],['high','많은순'],['low','적은순']].map(([k,lb])=>(
          <button key={k} onClick={()=>setSortBy(k)}
            style={{padding:'5px 11px',borderRadius:16,border:`2px solid ${sortBy===k?'#ADC2A9eea':'#eee'}`,
              background:sortBy===k?'#EEF0FF':'#fff',color:sortBy===k?'#ADC2A9eea':'#888',
              fontWeight:sortBy===k?800:400,fontSize:11,cursor:'pointer',transition:'all .15s'}}>
            {lb}
          </button>
        ))}
      </div>

      {/* 2열 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {sorted.map((d,i)=>{
          const bookCount = d.val;
          const showBlocks = bookCount <= MAX_SHOW;
          return (
            <div key={d.id||i}
              onClick={()=>onClickStudent&&onClickStudent(d)}
              style={{background:'#FAFAFA',borderRadius:14,padding:'10px 12px',cursor:onClickStudent?'pointer':'default',
                border:'1.5px solid #f0f0f0',transition:'all .2s'}}
              onMouseEnter={e=>{if(onClickStudent){e.currentTarget.style.borderColor='#ADC2A9eea';e.currentTarget.style.background='#F5F7FF';}}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#f0f0f0';e.currentTarget.style.background='#FAFAFA';}}>
              {/* 이름 + 번호 */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  {d.num && <span style={{fontSize:10,color:'#aaa',fontWeight:700}}>{d.num}</span>}
                  <span style={{fontWeight:800,fontSize:13,color:'#333'}}>{d.name}</span>
                </div>
                <span style={{fontWeight:900,fontSize:13,color:'var(--blue)'}}>{bookCount}회</span>
              </div>
              {/* 책 블록들 */}
              <div style={{minHeight:22}}>
                {bookCount === 0 ? (
                  <span style={{fontSize:11,color:'#ccc'}}>아직 기록 없음</span>
                ) : showBlocks ? (
                  <div style={{display:'flex',flexWrap:'wrap',gap:1,lineHeight:1}}>
                    {Array.from({length:bookCount}).map((_,bi)=>(
                      <span key={bi} style={{fontSize:14,display:'inline-block',
                        animation:bi===bookCount-1?'popIn .3s ease-out both':'none'}}>
                        📖
                      </span>
                    ))}
                  </div>
                ) : (
                  /* 20권 초과 시: 20개 블록 + 나머지 숫자 */
                  <div style={{display:'flex',flexWrap:'wrap',gap:1,alignItems:'center',lineHeight:1}}>
                    {Array.from({length:MAX_SHOW}).map((_,bi)=>(
                      <span key={bi} style={{fontSize:14,display:'inline-block'}}>📖</span>
                    ))}
                    <span style={{fontSize:12,fontWeight:800,color:'#2d3a2d',marginLeft:3}}>+{bookCount-MAX_SHOW}</span>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BarChart({ data }) {
  const max = Math.max(...data.map(d=>d.val), 1);
  const colors = ['#ADC2A9','#99A799','#D3E4CD','#99A799','#ADC2A9','#99A799'];
  return (
    <div className="bar-chart">
      {data.map((d,i) => (
        <div key={i} className="bar-row">
          <div className="bar-label">{d.name}</div>
          <div className="bar-track">
            <div className="bar-fill" style={{width:`${Math.round(d.val/max*100)}%`,background:colors[i%colors.length]}}>
              {d.val > 0 ? d.val : ''}
            </div>
          </div>
          <div className="bar-val">{d.val}</div>
        </div>
      ))}
    </div>
  );
}

function DonutChart({ data }) {
  const total = data.reduce((s,d)=>s+d.val,0)||1;
  const colors = ['#ADC2A9','#ADC2A9','#D3E4CD','#99A799','#99A799','#99A799'];
  let deg = 0;
  const stops = data.map((d,i)=>{ const pct=d.val/total*360; const s=`${colors[i%colors.length]} ${deg}deg ${deg+pct}deg`; deg+=pct; return s; }).join(', ');
  const top = [...data].sort((a,b)=>b.val-a.val)[0];
  return (
    <div style={{display:'flex',alignItems:'center',gap:18,flexWrap:'wrap'}}>
      <div className="donut" style={{background:`conic-gradient(${stops})`}}>
        <div className="donut-hole">
          <div style={{fontSize:18,fontWeight:800,color:'#2d3a2d'}}>{top?.emoji}</div>
          <div style={{fontSize:10,fontWeight:700,color:'#555'}}>{top?.key}</div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {data.filter(d=>d.val>0).map((d,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:colors[i%colors.length],flexShrink:0}}/>
            <span style={{fontSize:12,color:'#555'}}>{d.emoji} {d.key}: {d.val}회</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* PIN Input */
function PinInput({ value, onChange, onEnter }) {
  const inputRef = useRef();
  const digits = (value||'').replace(/\D/g,'').slice(0,4).split('').concat(['','','','']).slice(0,4);

  const handleChange = (e) => {
    const v = e.target.value.replace(/\D/g,'').slice(0,4);
    onChange(v);
  };

  const handleKeyDown = (e) => {
    if(e.key==='Enter' && value.length===4 && onEnter) { e.preventDefault(); onEnter(); return; }
    if(e.key==='Backspace' && !value) e.preventDefault();
  };

  return (
    <div style={{position:'relative', display:'flex', justifyContent:'center', gap:10, margin:'12px 0'}}
      onClick={()=>inputRef.current?.focus()}>
      {/* 실제 입력은 숨겨진 input이 담당 — 모바일 키패드 트리거 */}
      <input
        ref={inputRef}
        type="tel"
        inputMode="numeric"
        pattern="[0-9]*"
        maxLength={4}
        value={value||''}
        onChange={handleChange}
        onKeyDown={handleKeyDown}
        autoComplete="one-time-code"
        style={{
          position:'absolute', opacity:0, width:'100%', height:'100%',
          top:0, left:0, cursor:'pointer', fontSize:16,
        }}
      />
      {/* 시각적 표시 — 클릭하면 위 숨겨진 input이 포커스됨 */}
      {digits.map((d,i)=>(
        <div key={i} style={{
          width:52, height:58, border:`1.5px solid ${(value||'').length===i?'#99A799':'#ddd'}`,
          borderRadius:13, fontSize:24, fontWeight:800, textAlign:'center',
          background:(value||'').length===i?'#fff':'#FAFAFA',
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'border-color .2s', userSelect:'none',
          boxShadow:(value||'').length===i?'0 0 0 3px rgba(255,142,83,.2)':'none',
        }}>
          {d ? '●' : ''}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   STUDENT LOGIN
═══════════════════════════════════════ */
function StudentLogin({ students, onLogin, onRegister, onBack, classLabel }) {
  const [mode, setMode]   = useState('login');
  const [name, setName]   = useState('');
  const [pin, setPin]     = useState('');
  const [err, setErr]     = useState('');
  const nameRef           = useRef();

  // Register state
  const [rName, setRName]       = useState('');
  const [rPin, setRPin]         = useState('');
  const [rPin2, setRPin2]       = useState('');
  const [rPetName, setRPetName] = useState('');
  const [rPetType, setRPetType] = useState('dog');

  const tryLogin = () => {
    const trimmed = name.trim();
    if(!trimmed) { setErr('이름을 입력해 주세요'); return; }
    if(pin.length < 4) { setErr('비밀번호 4자리를 입력해 주세요'); return; }
    const found = students.find(s => s.name === trimmed);
    if(!found) { setErr('등록된 이름이 없어요. 새로 등록해 주세요!'); return; }
    if(found.password !== pin) { setErr('비밀번호가 틀렸어요! 🔐'); setPin(''); return; }
    setErr(''); onLogin(found);
  };

  const tryRegister = () => {
    if(!rName.trim()) { setErr('이름을 입력해 주세요'); return; }
    if(rPin.length < 4) { setErr('비밀번호 4자리를 입력해 주세요'); return; }
    if(rPin !== rPin2) { setErr('비밀번호가 일치하지 않아요!'); return; }
    if(!rPetName.trim()) { setErr('펫 이름을 입력해 주세요'); return; }
    if(students.some(s=>s.name===rName.trim())) { setErr('이미 있는 이름이에요'); return; }
    onRegister({ name:rName.trim(), password:rPin, petName:rPetName.trim(), petType:rPetType });
  };

  return (
    <div style={{background:'#FEF5ED',minHeight:'100vh',padding:'20px 18px'}}>
      <button onClick={onBack} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',marginBottom:10}}>←</button>

      {classLabel && (
        <div style={{textAlign:'center',marginBottom:12}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'var(--accent)',borderRadius:20,padding:'6px 16px'}}>
            <span style={{fontSize:14}}>🏫</span>
            <span style={{color:'#fff',fontWeight:800,fontSize:14}}>{classLabel}</span>
          </div>
        </div>
      )}

      {/* Peer view - read only, no interaction */}
      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,fontWeight:800,color:'#2d3a2d',marginBottom:9}}>👀 우리 반 펫 현황 <span style={{fontWeight:400,color:'#aaa',fontSize:11}}>(보기만 가능)</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          {students.map(s=>{
            const stage = getPetStage(s.xp||0, s.petType||'dog');
            return (
              <div key={s.id} className="peer-card" style={{userSelect:'none',pointerEvents:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{position:'relative',flexShrink:0}}>
                    <span style={{fontSize:30}}>{stage.emoji}</span>
                    {s.equipped?.hat && <span style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',fontSize:13}}>{getItem(s.equipped.hat)?.emoji}</span>}
                  </div>
                  <div style={{flex:1,overflow:'hidden'}}>
                    <div style={{fontWeight:800,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.petName||'?'}</div>
                    <div style={{fontSize:10,color:'#888'}}>{s.name} · {stage.name}</div>
                    <div style={{fontSize:10,color:'#2d3a2d'}}>🔥 {s.streak||0}일 연속</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{maxWidth:400,margin:'0 auto'}}>
        <div style={{display:'flex',gap:8,marginBottom:18}}>
          <button className={`btn btn-sm ${mode==='login'?'btn-primary':'btn-gray'}`} onClick={()=>{setMode('login');setErr('')}}>🔑 로그인</button>
          <button className={`btn btn-sm ${mode==='register'?'btn-primary':'btn-gray'}`} onClick={()=>{setMode('register');setErr('')}}>✨ 새로 등록</button>
        </div>

        {mode==='login' ? (
          <>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6}}>내 이름</label>
            <input ref={nameRef} className="input-field" style={{marginBottom:14}} placeholder="이름을 직접 입력하세요"
              value={name} onChange={e=>{setName(e.target.value);setErr('');}}
              onKeyDown={e=>e.key==='Enter'&&pin.length===4&&tryLogin()}
              autoComplete="off"/>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6}}>비밀번호 (숫자 4자리)</label>
            <PinInput value={pin} onChange={v=>{setPin(v);setErr('');}}/>
            {err && <div style={{color:'#2d3a2d',fontSize:13,fontWeight:700,textAlign:'center',marginTop:8,padding:'8px',background:'#D3E4CD',borderRadius:10}}>⚠️ {err}</div>}
            <button className="btn btn-primary" style={{width:'100%',marginTop:14}} disabled={!name.trim()||pin.length<4}
              onClick={tryLogin}>🌿 시작하기!</button>
          </>
        ) : (
          <>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6}}>내 이름</label>
            <input className="input-field" style={{marginBottom:12}} placeholder="이름을 입력하세요" value={rName} onChange={e=>setRName(e.target.value)}/>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6}}>비밀번호 (숫자 4자리)</label>
            <PinInput value={rPin} onChange={setRPin}/>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6,marginTop:12}}>비밀번호 확인</label>
            <PinInput value={rPin2} onChange={setRPin2}/>
            {rPin.length===4 && rPin2.length===4 && rPin!==rPin2 && (
              <div style={{color:'#2d3a2d',fontSize:12,fontWeight:700,marginTop:4}}>⚠️ 비밀번호가 일치하지 않아요</div>
            )}
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6,marginTop:12}}>펫 이름</label>
            <input className="input-field" style={{marginBottom:12}} placeholder="펫 이름을 직접 지어줘요!" value={rPetName} onChange={e=>setRPetName(e.target.value)}/>
            <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6}}>펫 종류 선택</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {Object.values(PET_LIBRARY).map(p=>(
                <div key={p.id} onClick={()=>setRPetType(p.id)}
                  style={{padding:'10px',borderRadius:13,border:`1.5px solid ${rPetType===p.id?'#ADC2A9':'#eee'}`,background:rPetType===p.id?'#FFF0F0':'#fff',cursor:'pointer',textAlign:'center',transition:'all .2s'}}>
                  <div style={{fontSize:26}}>{p.stages[1].emoji}</div>
                  <div style={{fontSize:11,fontWeight:700,marginTop:3}}>{p.label}</div>
                </div>
              ))}
            </div>
            {err && <div style={{color:'#2d3a2d',fontSize:13,fontWeight:700,marginBottom:8,padding:'8px',background:'#D3E4CD',borderRadius:10}}>⚠️ {err}</div>}
            <button className="btn btn-primary" style={{width:'100%'}} onClick={tryRegister}>🌱 펫 키우기 시작!</button>
          </>
        )}
      </div>
    </div>
  );
}

function StudentHome({ student, students, records, onRecord, onLogout, onUpdateStudent, onUpdateRecord, onDeleteRecord, showToast, classMission }) {
  const [tab, setTab] = useState('home');
  const myRecs = records.filter(r=>r.sid===student.id);
  const todayRec = myRecs.find(r=>r.date===todayStr());
  const myBadges = getBadges(student);
  const stage = getPetStage(student.xp||0, student.petType||'dog');

  // 이번 주 월요일~일요일 계산
  const stamps = (() => {
    const today = new Date();
    const dow = today.getDay(); // 0=일, 1=월 ... 6=토
    const diffToMon = (dow === 0) ? -6 : 1 - dow; // 월요일까지의 차이
    const monday = new Date(today);
    monday.setDate(today.getDate() + diffToMon);
    const dayLabels = ['월','화','수','목','금','토','일'];
    return Array.from({length:7}, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const y = d.getFullYear(), mo = String(d.getMonth()+1).padStart(2,'0'), dy = String(d.getDate()).padStart(2,'0');
      const ds = `${y}-${mo}-${dy}`;
      const isFuture = ds > todayStr();
      return {
        date: ds,
        label: dayLabels[i],
        filled: !isFuture && myRecs.some(r => r.date === ds),
        isToday: ds === todayStr(),
        isFuture,
        isWeekend: i >= 5,
      };
    });
  })();

  return (
    <div style={{background:'#FEF5ED',minHeight:'100vh'}}>
      <div className="header">
        <div>
          <h1>안녕, {student.name}! 👋</h1>
          <div style={{color:'rgba(255,255,255,.82)',fontSize:11}}>{stage.emoji} {student.petName}{(()=>{const c=(student.petName||'').charCodeAt((student.petName||'').length-1);return(c-44032)%28!==0?'이가':'가';})()}  기다리고 있어요</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div className="coin-badge" style={{background:"rgba(255,255,255,.3)",borderColor:"rgba(255,255,255,.5)",color:"#fff"}}>🌰 {student.coins||0}</div>
          <button onClick={onLogout} style={{background:'rgba(255,255,255,.35)',border:'1px solid rgba(255,255,255,.6)',color:'#2d3a2d',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>나가기</button>
        </div>
      </div>
      <div className="page-pad">
        {tab==='home'  && <HomeTab student={student} stamps={stamps} todayRec={todayRec} myBadges={myBadges} onRecord={onRecord} classMission={classMission}/>}
        {tab==='pet'   && <PetTab student={student}/>}
        {tab==='shop'  && <ShopTab student={student} onUpdateStudent={onUpdateStudent} showToast={showToast}/>}
        {tab==='recs'  && <RecsTab myRecs={myRecs} student={student} onUpdateRecord={onUpdateRecord} onDeleteRecord={onDeleteRecord} showToast={showToast}/>}
        {tab==='bdgs'  && <BdgsTab student={student} myBadges={myBadges}/>}
      </div>
      <div className="tab-bar">
        {[['home','📖','홈'],['pet','🌱','내 펫'],['shop','🍃','상점'],['recs','📋','기록'],['bdgs','🎖','배지']].map(([k,ic,lb])=>(
          <div key={k} className={`tab-item ${tab===k?'active':''}`} onClick={()=>setTab(k)}>
            <div className="tab-icon">{ic}</div><div>{lb}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#99A799'}}>선생님이 내주신 미션</div>

              <span style={{fontSize:11,color:'#6b7d6b',fontWeight:700}}>🎁 달성 보상:</span>
              {classMission.rewards.xp > 0 && (
                <span className="badge-tag badge-green">⚡ +{classMission.rewards.xp} XP</span>
              )}
              {classMission.rewards.coin > 0 && (

              )}
              {classMission.rewards.badge && (
                <span className="badge-tag badge-blue">🎖 {classMission.rewards.badge}</span>
              )}

      )}

      <div className="card" style={{marginBottom:13}}>

          <div style={{fontWeight:800,fontSize:14}}>📅 이번 주 독서 현황</div>
          <div style={{fontSize:11,color:'#aaa',fontWeight:700}}>
            {stamps.filter(s=>s.filled).length} / 7일
          </div>
        </div>
        <div className="stamp-row" style={{justifyContent:'space-between'}}>
          {stamps.map((s,i)=>(
            <div key={i} style={{textAlign:'center',flex:1}}>
              <div style={{
                fontSize:10, fontWeight:800, marginBottom:4,
                color: s.isToday ? '#ADC2A9' : s.isWeekend ? '#ADC2A9' : '#888',
              }}>{s.label}</div>
              <div className={`stamp ${s.filled?'filled':''} ${s.isToday?'today':''}`}
                style={{
                  width:36, height:36, fontSize:16, margin:'0 auto',
                  opacity: s.isFuture ? 0.3 : 1,
                  background: s.filled
                    ? 'linear-gradient(135deg,#ADC2A9,#99A799)'
                    : s.isFuture ? '#F5F5F5' : '#EFEFEF',
                }}>
                {s.filled ? '✓' : s.isFuture ? '' : ''}
              </div>
              <div style={{fontSize:9,color: s.isToday?'#ADC2A9':'#bbb',marginTop:3,fontWeight:s.isToday?800:400}}>
                {fmtDate(s.date)}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginBottom:13}}>
        <div style={{fontWeight:800,fontSize:14,marginBottom:7}}>📖 오늘의 독서 미션</div>
        {todayRec ? (
          <>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px',background:'#EBF3E8',borderRadius:11,marginBottom:8}}>

            {(()=>{
              const now = new Date();
              const kstNow = new Date(now.getTime() + 9*60*60*1000);
              // 다음날 KST 자정 = 오늘 KST 날짜 + 1일 00:00 UTC 기준
              const nextMidnightKST = new Date(Date.UTC(
                kstNow.getUTCFullYear(),
                kstNow.getUTCMonth(),
                kstNow.getUTCDate() + 1,
                0, 0, 0
              ) - 9*60*60*1000); // KST 자정을 UTC로 변환
              const diffMs = nextMidnightKST - now;
              const diffH  = Math.floor(diffMs / (1000*60*60));
              const diffM  = Math.floor((diffMs % (1000*60*60)) / (1000*60));
              return (
                <div style={{textAlign:'center',padding:'8px 12px',background:'#FEF5ED',
                  borderRadius:10,border:'1.5px dashed #FFD580'}}>
                  <span style={{fontSize:12,color:'#6b7d6b',fontWeight:600}}>
                    ⏰ &nbsp;
                    <span style={{fontSize:15,fontWeight:900,color:'#2d3a2d'}}>
                      {diffH > 0 ? `${diffH}시간 ${diffM}분` : `${diffM}분`}
                    </span>
                    &nbsp; 지나면 다시 기록할 수 있어요. 기다리는 동안 책을 읽는 건 어때요?
                  </span>
                </div>
              );
            })()}
          </>
        ) : (

function ShopTab({ student, onUpdateStudent, showToast }) {
  const [shopTab, setShopTab] = useState('shop');
  const [previewItem, setPreviewItem] = useState(null);   // 미리보기 아이템
  const [confirmItem, setConfirmItem] = useState(null);   // 구매 확인 중인 아이템
  const inv = student.inventory || [];
  const equipped = student.equipped || {};

  // 미리보기용 가상 장착 상태
  const previewEquipped = previewItem
    ? {...equipped, [previewItem.type]: previewItem.id}
    : equipped;
  const previewStudent = {...student, equipped: previewEquipped};

  const buyItem = (item) => {
    if((student.coins||0) < item.price) { showToast('코인이 부족해요! 💰'); setConfirmItem(null); return; }
    if(inv.includes(item.id)) { showToast('이미 가지고 있어요!'); setConfirmItem(null); return; }
    if(item.type==='food') {
      onUpdateStudent(student.id, {
        xp:(student.xp||0)+item.xpBonus,
        coins:(student.coins||0)-item.price,
      });
      showToast(`${item.name} 사용! +${item.xpBonus} XP 🎉`);
      setConfirmItem(null); setPreviewItem(null); return;
    }
    // 구매 후 자동 장착
    const newEquipped = {...equipped, [item.type]: item.id};
    onUpdateStudent(student.id, {
      inventory:[...inv, item.id],
      coins:(student.coins||0)-item.price,
      equipped: newEquipped,
    });
    showToast(`${item.name} 구매 완료! ✨`);
    setConfirmItem(null); setPreviewItem(null);
  };

  const equipItem = (item) => {
    const newEquipped = {...equipped};
    if(newEquipped[item.type]===item.id) {
      newEquipped[item.type]=null;
      showToast(`${item.name} 해제!`);
    } else {
      newEquipped[item.type]=item.id;
      showToast(`${item.name} 장착! ✨`);
    }
    onUpdateStudent(student.id, {equipped:newEquipped});
    setPreviewItem(null);
  };

  const byType = (type) => SHOP_ITEMS.filter(i=>i.type===type);

  return (
    <div className="fade-in">
      {/* 구매 확인 다이얼로그 */}
      {confirmItem && (
        <div className="overlay">
          <div className="dialog" style={{textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:8}}>{confirmItem.emoji}</div>
            <div style={{fontWeight:900,fontSize:18,marginBottom:4}}>{confirmItem.name}</div>
            <div style={{fontSize:13,color:'#888',marginBottom:16}}>{confirmItem.desc}</div>
            <div style={{background:'#D3E4CD',borderRadius:10,padding:'10px',marginBottom:20}}>
              <span style={{fontWeight:800,color:'#2d3a2d'}}>🌰 {confirmItem.price} 코인</span>
              <span style={{color:'#888',fontSize:12,marginLeft:8}}>→ 잔여 {(student.coins||0)-confirmItem.price} 코인</span>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-gray" style={{flex:1}} onClick={()=>{setConfirmItem(null);}}>취소</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>buyItem(confirmItem)}>구매하기</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['shop','🍃 상점'],['inv','🎒 인벤토리']].map(([k,lb])=>(
          <button key={k} className={`btn btn-sm ${shopTab===k?'btn-primary':'btn-gray'}`} onClick={()=>setShopTab(k)}>{lb}</button>
        ))}
        <div className="coin-badge" style={{marginLeft:'auto'}}>🌰 {student.coins||0} 코인</div>
      </div>

      {shopTab==='shop' && (
        <>
          {/* 미리보기 */}
          <div className="card" style={{marginBottom:13,textAlign:'center',background:'linear-gradient(135deg,#EBF3E8,#D3E4C9)'}}>
            <div style={{fontSize:13,fontWeight:800,color:'#555',marginBottom:4}}>👁 현재 내 펫 미리보기</div>
            {previewItem && (
              <div style={{fontSize:11,color:'#99A799',fontWeight:700,marginBottom:6}}>
                ✨ {previewItem.name} 미리보는 중
              </div>
            )}
            <PetDisplay student={previewStudent} size="lg"/>
            {previewItem && (
              <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:10}}>
                <button className="btn btn-gray btn-sm" onClick={()=>setPreviewItem(null)}>취소</button>
                {!inv.includes(previewItem.id) ? (
                  <button className="btn btn-primary btn-sm" onClick={()=>setConfirmItem(previewItem)}>
                    🌰 {previewItem.price} 코인으로 구매
                  </button>
                ) : (
                  <button className="btn btn-secondary btn-sm" onClick={()=>{equipItem(previewItem);setPreviewItem(null);}}>
                    {equipped[previewItem.type]===previewItem.id ? '해제하기' : '장착하기'}
                  </button>
                )}
              </div>
            )}
          </div>

          {[['hat','🎩 모자'],['acc','💫 악세서리'],['bg','🌅 배경'],['food','🍎 먹이']].map(([type,lb])=>(
            <div key={type} className="card" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:11}}>{lb}</div>
              <div className="shop-grid">
                {byType(type).map(item=>{
                  const owned = inv.includes(item.id);
                  const isEquipped = equipped[item.type]===item.id;
                  const isPreviewing = previewItem?.id===item.id;
                  return (
                    <div key={item.id}
                      className={`shop-item ${owned?'owned':''} ${isEquipped?'equipped':''}`}
                      style={{outline: isPreviewing?'2px solid #ADC2A9':undefined}}
                      onClick={()=>{
                        if(type==='food') { setConfirmItem(item); return; }
                        setPreviewItem(isPreviewing ? null : item);
                      }}>
                      <div style={{fontSize:32,marginBottom:5}}>{item.emoji}</div>
                      <div style={{fontWeight:800,fontSize:12,marginBottom:2}}>{item.name}</div>
                      <div style={{fontSize:10,color:'#888',marginBottom:6}}>{item.desc}</div>
                      {owned
                        ? <div style={{fontSize:11,fontWeight:800,color:'#99A799'}}>{isEquipped?'✨ 장착 중':'✅ 보유 중'}</div>
                        : <div style={{fontSize:12,fontWeight:800,color:'#C17F4A'}}>🌰 {item.price} 코인</div>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      )}

      {shopTab==='inv' && (
        <div className="card">
          <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>🎒 내 아이템</div>
          {inv.length===0 ? (
            <div style={{textAlign:'center',padding:'30px',color:'#aaa',fontWeight:700}}>아직 아이템이 없어요!<br/>상점에서 구매해 보세요 🛒</div>
          ) : (
            <div className="shop-grid">
              {inv.map(id=>{
                const item = getItem(id);
                if(!item) return null;
                const isEquipped = equipped[item.type]===item.id;
                return (
                  <div key={id} className={`shop-item owned ${isEquipped?'equipped':''}`}
                    onClick={()=>item.type!=='food'&&equipItem(item)}>
                    <div style={{fontSize:32,marginBottom:5}}>{item.emoji}</div>
                    <div style={{fontWeight:800,fontSize:12,marginBottom:2}}>{item.name}</div>
                    {item.type!=='food' && (
                      <div style={{fontSize:11,fontWeight:800,color:isEquipped?'#99A799':'#99A799'}}>{isEquipped?'✨ 장착 중':'탭하여 장착'}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   READING RECORD FORM (single page)
═══════════════════════════════════════ */
function RecordForm({ student, onSave, onBack }) {
  const [book,      setBook]      = useState('');
  const [pages,     setPages]     = useState('');
  const [scene,     setScene]     = useState('');
  const [word,      setWord]      = useState('');
  const [hasWord,   setHasWord]   = useState(null);
  const [wordErr,   setWordErr]   = useState('');
  const [mood,      setMood]      = useState('');
  const [customMoodEmoji, setCustomMoodEmoji] = useState('🙂');
  const [customMoodText,  setCustomMoodText]  = useState('');
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const [star,      setStar]      = useState(0);
  const [bonusAns,  setBonusAns]  = useState('');
  const [screenResult, setScreenResult] = useState(null);
  const [bonusQ,    setBonusQ]    = useState(null);
  const [submitted, setSubmitted] = useState(false);

  const hasOnlyJamo = (str) => /^[ㄱ-ㅎㅏ-ㅣ\s]+$/.test(str.trim());

  const validateWord = (val) => {
    if(!val.trim()) { setWordErr(''); return; }
    if(hasOnlyJamo(val)) setWordErr('자음이나 모음만 있어요! 완성된 단어를 입력해 주세요 😊');
    else setWordErr('');
  };

  const failedFields = useMemo(() => {
    if(!screenResult || screenResult.pass) return {};
    const f = {};
    if(!book || book.trim().length < SCREENING_RULES.minBookLen) f.book = true;
    if(!scene || scene.trim().length < SCREENING_RULES.minSceneLen) f.scene = true;
    const hasForbidden = SCREENING_RULES.forbiddenWords.some(w => (scene||'').includes(w));
    if(hasForbidden) f.scene = true;
    return f;
  }, [screenResult, book, scene]);

  const canCheckScreening = book.trim() && scene.trim() && hasWord !== null &&
    (hasWord === false || (word.trim() && !wordErr));

  const screening = () => {
    const result = SCREENING_RULES.check({book, scene, word: hasWord===false?'':word});
    setScreenResult(result);
    if(result.pass) {
      const q = BONUS_QUESTIONS[Math.floor(Math.random()*BONUS_QUESTIONS.length)];
      setBonusQ(q);
    }
  };

  const canSubmit = () => mood && star > 0 && screenResult?.pass;

  const handleSave = () => {
    if(submitted) return;
    setSubmitted(true);
    const finalMood = mood==='__custom__' && customMoodText.trim()
      ? `${customMoodEmoji} ${customMoodText.trim()}`
      : mood;
    onSave({book, pages, scene, word: hasWord===false?'':word, mood:finalMood, star, bonusAns});
  };

  const fieldHints = {
    book:  '📖 책 제목을 2글자 이상 정확히 입력해 주세요',
    scene: '💭 기억에 남는 장면을 10글자 이상 구체적으로 써 주세요 (예: "주인공이 ~한 장면이 인상 깊었어요")',
  };

  return (
    <div style={{background:'#FEF5ED',minHeight:'100vh'}}>
      <div className="header">
        <button onClick={onBack} style={{background:'rgba(255,255,255,.25)',border:'none',color:'#fff',borderRadius:20,padding:'5px 13px',cursor:'pointer',fontSize:13,fontWeight:700}}>← 뒤로</button>
        <h1>독서 기록하기 📝</h1>
        <div/>
      </div>
      <div style={{padding:'18px 15px 100px'}}>

        {/* Book info */}
        <div className="card fade-in" style={{marginBottom:13,border:`2px solid ${failedFields.book?'#ADC2A9':'transparent'}`}}>
          <div style={{fontWeight:800,fontSize:16,color:'#2d3a2d',marginBottom:13}}>📖 읽은 책 정보</div>
          <label style={{fontWeight:800,fontSize:14,color:failedFields.book?'#2d3a2d':'#555',display:'block',marginBottom:6}}>
            책 제목 * {failedFields.book && <span style={{fontSize:12,fontWeight:400}}>← 수정 필요!</span>}
          </label>
          <input className="input-field" style={{marginBottom:6,borderColor:failedFields.book?'#ADC2A9':'#D3E4CD'}}
            placeholder="예) 강아지 별, 마법의 설탕" value={book}
            onChange={e=>{setBook(e.target.value);setScreenResult(null);}}/>
          {failedFields.book && (
            <div style={{fontSize:12,color:'#2d3a2d',fontWeight:700,marginBottom:10,padding:'7px 10px',background:'#D3E4CD',borderRadius:9}}>
              ✏️ {fieldHints.book}
            </div>
          )}
          <label style={{fontWeight:800,fontSize:14,color:'#555',display:'block',marginBottom:6,marginTop:4}}>읽은 분량</label>
          <input className="input-field" placeholder="예) 20~30쪽, 1장" value={pages} onChange={e=>setPages(e.target.value)}/>
        </div>

        {/* Content */}
        <div className="card fade-in" style={{marginBottom:13,border:`2px solid ${failedFields.scene?'#ADC2A9':'transparent'}`}}>
          <div style={{fontWeight:800,fontSize:16,color:'#2d3a2d',marginBottom:13}}>💭 내용 기록</div>
          <label style={{fontWeight:800,fontSize:14,color:failedFields.scene?'#2d3a2d':'#555',display:'block',marginBottom:6}}>
            기억에 남는 장면 * <span style={{fontWeight:400,color:'#aaa',fontSize:12}}>(10자 이상)</span>
            {failedFields.scene && <span style={{fontSize:12,fontWeight:400,color:'#2d3a2d'}}> ← 수정 필요!</span>}
          </label>
          <textarea className="input-field" style={{marginBottom:6,borderColor:failedFields.scene?'#ADC2A9':'#D3E4CD'}}
            placeholder="예) 주인공이 처음으로 날 수 있게 된 장면이 정말 인상적이었어요." value={scene}
            onChange={e=>{setScene(e.target.value);setScreenResult(null);}}/>
          {/* 글자 수 + 보너스 미리보기 */}
          {(() => {
            const len = scene.trim().length;
            const bonus = XP_TABLE.sceneBonus(scene);
            const nextThreshold = len < 50 ? 50 : len < 100 ? 100 : len < 200 ? 200 : null;
            const nextBonus = nextThreshold === 50 ? '+1 XP' : nextThreshold === 100 ? '+3 XP' : nextThreshold === 200 ? '+5 XP' : null;
            return (
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{fontSize:11,color: len>=200?'#99A799': len>=100?'#99A799': len>=50?'#FFB300':'#aaa',fontWeight:700}}>
                  {len}자
                  {bonus.xp > 0 && <span style={{marginLeft:6,padding:'2px 8px',borderRadius:10,
                    background: len>=200?'#E8F5E9': len>=100?'#FFF3E0':'#FFFDE7',
                    color: len>=200?'#2E7D32': len>=100?'#E65100':'#F57F17'}}>
                    🎉 {bonus.label}
                  </span>}
                </div>
                {nextThreshold && (
                  <div style={{fontSize:10,color:'#bbb',fontWeight:600}}>
                    {nextThreshold - len}자 더 쓰면 {nextBonus} 추가!
                  </div>
                )}

            );
          })()}

            <div style={{fontSize:12,color:'#2d3a2d',fontWeight:700,marginBottom:10,padding:'7px 10px',background:'#D3E4CD',borderRadius:9}}>

                <div style={{fontSize:12,color:'#2d3a2d',fontWeight:700,marginTop:6,padding:'7px 10px',background:'#D3E4CD',borderRadius:9}}>

            <div className="fade-in" style={{fontSize:12,color:'#aaa',padding:'8px 10px',background:'#F9F9F9',borderRadius:9}}>

          )}

        {/* Feeling */}
        <div className="card fade-in" style={{marginBottom:13}}>
          <div style={{fontWeight:800,fontSize:16,color:'#2d3a2d',marginBottom:13}}>😊 책을 읽고 난 느낌</div>
          <div className="mood-grid" style={{marginBottom:10}}>
            {MOODS.map(m=>(
              <div key={m.key} className={`mood-btn ${mood===m.key?'sel':''}`} onClick={()=>{setMood(m.key);setCustomMoodText('');}}>

                      <button key={e} onClick={()=>{setCustomMoodEmoji(e);setShowEmojiPicker(false);}}
                        style={{fontSize:22,background:'none',border:'none',cursor:'pointer',
                          borderRadius:6,padding:'3px',transition:'background .15s'}}

                placeholder="예) 설레는, 신기한, 편안한..."
                value={customMoodText}
                maxLength={10}
                onChange={e=>{
                  setCustomMoodText(e.target.value);
                  if(e.target.value.trim()) setMood('__custom__');
                  else if(mood==='__custom__') setMood('');
                }}/>
            </div>
            {customMoodText.trim() && (
              <div className="fade-in" style={{marginTop:8,display:'flex',alignItems:'center',gap:6,

          <div className="star-row">
            {[1,2,3,4,5].map(s=>(
              <div key={s} className={`star-item ${star>=s?'on':''}`} onClick={()=>setStar(s)}>⭐</div>

          </div>
        </div>

        {/* Screening button */}
        {!screenResult && (
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:13}}
            disabled={!canCheckScreening}
            onClick={screening}>🔍 기록 내용 확인하기</button>
        )}

        {/* Screening result */}
        {screenResult && (
          screenResult.pass ? (
            <div className="screening-pass fade-in" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,color:'#2d3a2d',marginBottom:4}}>✅ 훌륭한 기록이에요!</div>
              <div style={{fontSize:13,color:'#555'}}>성의 있게 작성했어요! 보너스 질문이 열렸어요 🎉</div>
            </div>
          ) : (
            <div className="screening-fail fade-in" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,color:'#2d3a2d',marginBottom:8}}>✏️ 아래 항목을 다시 작성해 주세요!</div>
              {screenResult.issues.map((iss,i)=>(
                <div key={i} style={{fontSize:13,color:'#555',marginBottom:5,padding:'7px 11px',background:'rgba(255,255,255,.7)',borderRadius:9,borderLeft:'3px solid #FF8E53'}}>
                  ⚠️ {iss}
                </div>
              ))}
              <div style={{fontSize:12,color:'#2d3a2d',marginTop:8,fontWeight:700}}>🔴 빨간 테두리 칸을 찾아서 수정한 뒤 다시 확인해 보세요!</div>
            </div>
          )
        )}

        {/* Re-check button after fail */}
        {screenResult && !screenResult.pass && (
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:13}}
            disabled={!canCheckScreening}
            onClick={screening}>🔄 다시 확인하기</button>
        )}

        {/* Bonus question */}
        {screenResult?.pass && bonusQ && (
          <div className="card fade-in" style={{marginBottom:13,border:'1.5px solid #ADC2A9',background:'linear-gradient(135deg,#F3E5FF,#fff)'}}>
            <div style={{fontWeight:800,fontSize:14,color:'var(--blue)',marginBottom:8}}>⭐ 보너스 질문 (+{XP_TABLE.bonusQ} XP)</div>
            <div style={{fontSize:14,color:'#333',marginBottom:9,fontWeight:700}}>{bonusQ.q}</div>
            <textarea className="input-field" placeholder={bonusQ.placeholder} value={bonusAns} onChange={e=>setBonusAns(e.target.value)} rows={3}/>
            <div style={{fontSize:11,color:'var(--blue)',marginTop:5}}>✨ 작성하면 추가 {XP_TABLE.bonusQ} XP + {XP_TABLE.bonusQ} 코인!</div>
          </div>
        )}

        {/* XP preview */}
        {canSubmit() && (
          <div className="card fade-in" style={{marginBottom:13,background:'linear-gradient(135deg,#FFF9C4,#FFF3CD)',border:'1px solid #FFD700'}}>
            <div style={{fontWeight:800,fontSize:13,color:'#856404',marginBottom:6}}>🎯 예상 보상</div>
            <div style={{fontSize:13,color:'#555'}}>
              XP: <strong style={{color:'#2d3a2d'}}>+{calcXP({word: hasWord===true?word:'', bonusAns},student.streak||0)}</strong>
              &nbsp;· 코인: <strong style={{color:'#F7971E'}}>+{calcXP({word: hasWord===true?word:'', bonusAns},student.streak||0)}</strong> 💰
            </div>
            {(student.streak||0)>0 && <div style={{fontSize:11,color:'#856404',marginTop:3}}>🔥 {student.streak}일 연속 보너스 포함!</div>}
          </div>
        )}

        <button className="btn btn-green" style={{width:'100%',fontSize:16,padding:'15px'}}
          disabled={!canSubmit()||submitted}
          onClick={handleSave}>🎉 기록 완성 ✨</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   TEACHER DASHBOARD
═══════════════════════════════════════ */
function TeacherDashboard({ students, records, onUpdateStudent, onDeleteStudent, onLogout, classInfo, onBackToClasses }) {
  const [tab, setTab]           = useState('overview');
  const [toast, setToast]       = useState('');
  const [toastType, setToastType] = useState('success');
  const [praiseFor, setPraise]  = useState(null);
  const [coinAmount, setCoinAmount] = useState(10);
  const [classMsgVal, setClassMsg] = useState('');

  // Push notification state
  const [pushTarget, setPushTarget] = useState(null);
  const [pushMsg, setPushMsg]       = useState('');
  const [notifications, setNotifications] = useState([]);

  // Mission state
  const [missionVal, setMission]   = useState('');
  const [missionRewards, setMissionRewards] = useState({ coin:0, xp:0, badge:'' });
  const [activeMission, setActiveMission]   = useState(null);

  // Student management
  const [manageTarget, setManageTarget] = useState(null);
  const [newPw, setNewPw]               = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);

  // 학생별 탭 정렬 + 수정
  const [studentSort, setStudentSort]       = useState('num');
  const [editStudentId, setEditStudentId]   = useState(null);
  const [editStudentData, setEditStudentData] = useState({});

  const sortedStudents = useMemo(()=>{
    const arr = [...students];
    if(studentSort==='num')  return arr.sort((a,b)=>parseInt(a.num||'99')-parseInt(b.num||'99'));
    if(studentSort==='name') return arr.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    if(studentSort==='high') return arr.sort((a,b)=>records.filter(r=>r.sid===b.id).length - records.filter(r=>r.sid===a.id).length);
    if(studentSort==='low')  return arr.sort((a,b)=>records.filter(r=>r.sid===a.id).length - records.filter(r=>r.sid===b.id).length);
    return arr;
  }, [students, studentSort, records]);

                <div style={{fontSize:12,color:'var(--blue)',fontWeight:800,background:'#EEF0FF',padding:'4px 11px',borderRadius:20}}>

                <button key={k}

                  style={{padding:'5px 11px',borderRadius:16,border:`2px solid ${studentSort===k?'#ADC2A9eea':'#eee'}`,

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:13}}>
              {sortedStudents.map(s=>{
                const stage = getPetStage(s.xp||0, s.petType||'dog');
                const diff = daysDiff(s.lastActive);
                const sRecCount = records.filter(r=>r.sid===s.id).length;
                const isEditing = editStudentId === s.id;
                return (
                  <div key={s.id} className="card"
                    style={{padding:'12px',marginBottom:0,border:`1.5px solid ${diff>=3?'#D3E4CD':'#eee'}`,position:'relative'}}>
                    {/* 상단: 펫 + 이름 */}
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <PetDisplay student={s} size="sm"/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          {s.num && <span style={{fontSize:10,color:'#aaa',fontWeight:700,flexShrink:0}}>{s.num}</span>}
                          <span style={{fontWeight:800,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                            cursor:'pointer',color:'var(--blue)'}}
                            onClick={()=>openDetail(s)}>
                            {s.name||'?'}
                          </span>
                        </div>
                        <div style={{fontSize:10,color:'#aaa'}}>{stage.name} · Lv.{stage.stage}</div>
                      </div>
                      {/* 수정 버튼 */}
                      <button
                        onClick={()=>{ setEditStudentId(s.id); setEditStudentData({name:s.name||'',num:s.num||'',petName:s.petName||'',personalCode:s.personalCode||''}); }}

                      </button>

                    {/* 수정 폼 */}
                    {isEditing && (
                      <div style={{background:'#EBF3E8',borderRadius:10,padding:'10px',marginBottom:8,border:'1.5px solid #667eea'}}>
                        <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',marginBottom:7}}>학생 정보 수정</div>
                        {[
                          ['번호', 'num', '예) 1'],
                          ['이름', 'name', '예) 김민준'],
                          ['펫 이름', 'petName', '예) 뭉치'],
                          ['개인 코드', 'personalCode', '4자리 숫자'],
                        ].map(([lb, key, ph])=>(
                          <div key={key} style={{marginBottom:6}}>
                            <div style={{fontSize:10,color:'#888',marginBottom:2}}>{lb}</div>
                            <input className="input-field" style={{padding:'6px 10px',fontSize:12}}
                              placeholder={ph}
                              value={editStudentData[key]||''}
                              onChange={e=>setEditStudentData(p=>({...p,[key]:e.target.value}))}/>
                          </div>
                        ))}
                        <div style={{display:'flex',gap:6,marginTop:8}}>
                          <button className="btn btn-gray btn-sm" style={{flex:1,fontSize:11}}
                            onClick={()=>setEditStudentId(null)}>취소</button>
                          <button className="btn btn-secondary btn-sm" style={{flex:2,fontSize:11}}
                            onClick={async()=>{
                              await onUpdateStudent(s.id, editStudentData);
                              setEditStudentId(null);
                              showToast('학생 정보를 수정했어요 ✅');
                            }}>저장</button>
                        </div>
                      </div>
                    )}

                    {/* 스탯 */}
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#888',marginBottom:6}}>
                      <span>📚 {sRecCount}회</span>
                      <span>🔥 {s.streak||0}일</span>
                      <span>⚡ {s.xp||0} XP</span>
                    </div>

                    {/* 책 블록 미니 */}
                    <div style={{minHeight:18,marginBottom:7}}>

                        <div style={{display:'flex',flexWrap:'wrap',gap:1}}>
                          {Array.from({length:Math.min(sRecCount,15)}).map((_,bi)=>(
                            <span key={bi} style={{fontSize:12}}>📖</span>

                      <button key={i} className="btn btn-yellow" style={{textAlign:'left',justifyContent:'flex-start',fontSize:12,padding:'10px 14px'}}

                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {inactive.map(s=>(

            {/* Individual push */}
            <div className="card" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:11}}>👤 학생별 개별 알림 보내기</div>
              {students.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid #f0f0f0'}}>
                  <PetDisplay student={s} size="sm"/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13}}>{s.name||'?'}</div>
                    <div style={{fontSize:11,color:daysDiff(s.lastActive)>=3?'#ADC2A9':'#aaa'}}>
                      마지막 기록: {fmtDate(s.lastActive)}
                    </div>
                  </div>
                  <button className="btn btn-sm btn-primary" onClick={()=>setPushTarget(s)}>📣 알림</button>
                </div>
              ))}
            </div>

            {/* Log */}
            {notifications.length>0 && (
              <div className="card">
                <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>📋 최근 발송 알림 내역</div>
                {notifications.slice(0,10).map((n,i)=>(
                  <div key={i} style={{padding:'8px 0',borderBottom:'1px solid #f0f0f0',fontSize:12}}>
                    <span style={{fontWeight:700,color:'var(--blue)'}}>{n.name}</span>
                    <span style={{color:'#aaa'}}> · {fmtDate(n.date)}</span>
                    <div style={{color:'#555',marginTop:2}}>{n.msg}</div>

          </div>

        {/* ─── REWARDS ─── */}
        {tab==='rewards' && (
          <div className="fade-in">
            {/* Global coin amount setting */}
            <div className="card" style={{marginBottom:13,background:'linear-gradient(135deg,#FFF9C4,#FFF3CD)',border:'1.5px solid #FFD700'}}>
              <div style={{fontWeight:800,fontSize:14,color:'#856404',marginBottom:9}}>⚙️ 코인 선물 기본 금액 설정</div>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8,flexWrap:'wrap'}}>
                {[5,10,20,30,50].map(n=>(
                  <button key={n} onClick={()=>setCoinAmount(n)}
                    style={{padding:'8px 14px',borderRadius:20,border:`2px solid ${coinAmount===n?'#F7971E':'#eee'}`,background:coinAmount===n?'#FFF3E0':'#fff',fontWeight:800,fontSize:14,cursor:'pointer',transition:'all .2s'}}>
                    {n}💰
                  </button>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:9}}>
                <input type="number" min={1} max={999} className="input-field" style={{flex:1}}
                  value={coinAmount} onChange={e=>setCoinAmount(Math.max(1,parseInt(e.target.value)||1))}/>
                <span style={{fontWeight:800,color:'#F7971E',flexShrink:0}}>코인</span>
              </div>
              <div style={{fontSize:12,color:'#856404',marginTop:7}}>현재 설정: 칭찬 시 <strong>💰 {coinAmount}코인</strong> 지급</div>
            </div>

            <div className="card" style={{marginBottom:13,background:'linear-gradient(135deg,#E8F5E9,#F1F8E9)'}}>
              <div style={{fontWeight:800,fontSize:14,color:'#2d3a2d',marginBottom:7}}>🎉 학급 전체 응원 메시지</div>
              <input className="input-field" placeholder="예) 이번 주 모두 너무 잘했어요! 🌟" value={classMsgVal} onChange={e=>setClassMsg(e.target.value)}/>
              <button className="btn btn-green" style={{width:'100%',marginTop:10}}
                onClick={()=>{
                  students.forEach(s=>onUpdateStudent(s.id,{teacherMsg:classMsgVal||'선생님이 응원해요! 💪'}));
                  showToast('학급 전체에 응원 메시지를 보냈어요! 🎉');
                  setClassMsg('');
                }}>📢 전체 메시지 보내기</button>
            </div>
            <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>👤 학생별 칭찬 / 코인 보내기</div>
            {students.map(s=>(
              <div key={s.id} className="card" style={{marginBottom:9}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <PetDisplay student={s} size="sm"/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,cursor:'pointer',color:'var(--blue)',textDecoration:'underline',textDecorationStyle:'dotted'}}
                      onClick={()=>openDetail(s)}>{s.name||'?'}</div>
                    <div style={{fontSize:11,color:'#aaa'}}>💰 {s.coins||0} 코인 보유</div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:3}}>
                      {(s.praises||[]).slice(-3).map((p,i)=><span key={i} className="badge-tag badge-gold" style={{fontSize:10}}>🏅 {p}</span>)}
                    </div>
                  </div>
                  <button className="btn btn-sm btn-yellow" onClick={()=>setPraise(s)}>칭찬 주기</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ─── MISSION ─── */}
        {tab==='mission' && (
          <div className="fade-in">
            {activeMission && (
              <div className="card" style={{marginBottom:13,background:'linear-gradient(135deg,#E8F5E9,#F1F8E9)',border:'1.5px solid #56AB2F'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{fontWeight:800,fontSize:13,color:'#2d3a2d',marginBottom:5}}>📋 현재 진행 중인 미션</div>
                  <button className="btn btn-sm btn-gray" onClick={async ()=>{
                    setActiveMission(null);
                    if(FB_READY && classInfo?.uid && classInfo?.id) {
                      try { await clearMission(classInfo.uid, classInfo.id); } catch(e) {}
                    }
                  }}>종료</button>
                </div>
                <div style={{fontSize:13,color:'#333',marginBottom:8}}>{activeMission.text}</div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  {activeMission.rewards?.coin>0 && <span className="badge-tag badge-orange">💰 +{activeMission.rewards.coin} 코인</span>}
                  {activeMission.rewards?.xp>0 && <span className="badge-tag badge-gold">⚡ +{activeMission.rewards.xp} XP</span>}
                  {activeMission.rewards?.badge && <span className="badge-tag badge-purple">🏅 {activeMission.rewards.badge}</span>}
                </div>
              </div>
            )}

            <div className="card" style={{marginBottom:13}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:9}}>📌 새 미션 설정</div>
              <textarea className="input-field" rows={3} placeholder="예) 이번 주에는 동물이 나오는 책을 읽어보세요!"
                value={missionVal} onChange={e=>setMission(e.target.value)} style={{marginBottom:13}}/>

              {/* Reward config */}
              <div style={{background:'#F9F9F9',borderRadius:13,padding:'13px',marginBottom:13}}>
                <div style={{fontWeight:800,fontSize:13,marginBottom:11}}>🎁 미션 완료 보상 설정</div>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#F7971E',width:60}}>💰 코인</span>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {[0,5,10,20,30].map(n=>(
                      <button key={n} onClick={()=>setMissionRewards(r=>({...r,coin:n}))}
                        style={{padding:'5px 11px',borderRadius:16,border:`2px solid ${missionRewards.coin===n?'#F7971E':'#eee'}`,background:missionRewards.coin===n?'#FFF3E0':'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>
                        {n===0?'없음':`+${n}`}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#2d3a2d',width:60}}>⚡ XP</span>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {[0,5,10,15,20].map(n=>(
                      <button key={n} onClick={()=>setMissionRewards(r=>({...r,xp:n}))}
                        style={{padding:'5px 11px',borderRadius:16,border:`2px solid ${missionRewards.xp===n?'#ADC2A9':'#eee'}`,background:missionRewards.xp===n?'#FFF0F0':'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>
                        {n===0?'없음':`+${n}`}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:9}}>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--blue)',width:60}}>🏅 배지</span>
                  <input className="input-field" style={{flex:1,padding:'8px 12px'}} placeholder="예) 이번 주 독서왕"
                    value={missionRewards.badge} onChange={e=>setMissionRewards(r=>({...r,badge:e.target.value}))}/>
                </div>
              </div>

              <button className="btn btn-secondary" style={{width:'100%'}} onClick={setMissionActive}>✅ 미션 설정하기</button>
            </div>

            <div className="card">
              <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>🎯 추천 미션 템플릿</div>
              {[
                {t:'📖 3일 연속 읽기 챌린지',d:'이번 주 3일 이상 독서 기록을 남겨보세요!',r:{coin:15,xp:10,badge:'3일 챌린저'}},
                {t:'✨ 낱말 5개 수집 미션',d:'이번 주 새로운 낱말을 5개 이상 찾아보세요!',r:{coin:10,xp:5,badge:'낱말 수집가'}},
                {t:'🌟 친구에게 책 추천하기',d:'내가 읽은 책을 기록에 추천 이유를 써봐요!',r:{coin:10,xp:5,badge:''}},
                {t:'😊 다양한 감정 경험하기',d:'다른 기분이 드는 책을 읽어봐요!',r:{coin:5,xp:5,badge:''}},
              ].map((m,i)=>(
                <div key={i} style={{padding:'12px',background:'#F9F9F9',borderRadius:11,marginBottom:8,cursor:'pointer',border:'1.5px solid transparent',transition:'all .2s'}}
                  onClick={()=>{setMission(m.d);setMissionRewards(m.r);}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#ADC2A9'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='transparent'}>
                  <div style={{fontWeight:700,fontSize:13}}>{m.t}</div>
                  <div style={{fontSize:11,color:'#888',marginTop:2}}>{m.d}</div>
                  <div style={{display:'flex',gap:6,marginTop:5}}>
                    {m.r.coin>0 && <span className="badge-tag badge-orange" style={{fontSize:10}}>💰 +{m.r.coin}</span>}
                    {m.r.xp>0 && <span className="badge-tag badge-gold" style={{fontSize:10}}>⚡ +{m.r.xp} XP</span>}
                    {m.r.badge && <span className="badge-tag badge-purple" style={{fontSize:10}}>🏅 {m.r.badge}</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   PET SETUP SCREEN  (첫 로그인 시 펫 종류 + 이름 설정)
═══════════════════════════════════════════════════════════ */
function PetSetupScreen({ student, onDone }) {
  const [selType, setSelType] = useState('');
  const [petName, setPetName] = useState('');
  const [step, setStep]       = useState(1); // 1: 종류 선택, 2: 이름 짓기

  const selectedPet = selType ? PET_LIBRARY[selType] : null;
  const previewStage = selectedPet ? selectedPet.stages[1] : null; // 2단계 미리보기

  return (
    <div style={{background:'#FEF5ED',minHeight:'100vh',padding:'24px 18px'}}>

      <div style={{textAlign:'center',marginBottom:24}}>

        <p style={{color:'#aaa',fontSize:13,marginTop:4}}>
          {step===1 ? `${student.name}의 독서를 함께할 펫이에요` : '나만의 특별한 이름을 지어주세요'}
        </p>
        {/* 단계 표시 */}
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:12}}>
          {[1,2].map(i=>(

              background:step>=i?'#ADC2A9':'#ddd',transition:'all .3s'}}/>
          ))}
        </div>
      </div>

      {step===1 && (
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {Object.values(PET_LIBRARY).map(pet=>{
              const stage2 = pet.stages[1];
              const sel = selType===pet.id;
              return (
                <div key={pet.id} onClick={()=>setSelType(pet.id)}
                  className="card"
                  style={{padding:'16px 12px',textAlign:'center',cursor:'pointer',
                    border:`3px solid ${sel?'#ADC2A9':'#eee'}`,
                    background:sel?'#FFF0F0':'#fff',
                    transform:sel?'scale(1.03)':'scale(1)',
                    transition:'all .2s',boxShadow:sel?'0 6px 20px rgba(255,107,107,.2)':'none'}}>
                  <div style={{fontSize:44,marginBottom:6}}>{stage2.emoji}</div>
                  <div style={{fontWeight:800,fontSize:13,color:sel?'#ADC2A9':'#333'}}>

                  {sel && <div style={{fontSize:11,color:'#2d3a2d',fontWeight:800,marginTop:4}}>✅ 선택됨!</div>}

            })}
          </div>
          <button className="btn btn-primary" style={{width:'100%',fontSize:16,padding:'15px'}}
            disabled={!selType}
            onClick={()=>setStep(2)}>
            다음 → 이름 짓기
          </button>
        </div>
      )}

      {step===2 && selectedPet && (
        <div className="fade-in">
          {/* 선택한 펫 미리보기 */}
          <div className="card" style={{textAlign:'center',marginBottom:16,
            background:`linear-gradient(135deg,${previewStage.color},#fff)`}}>

            <div style={{fontWeight:800,fontSize:16,color:'#2d3a2d'}}>

            <div style={{fontSize:12,color:'#aaa',marginTop:4}}>
              지금은 알이지만 독서하면 점점 성장해요! 🌱
            </div>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <label style={{fontWeight:800,fontSize:15,color:'#555',display:'block',marginBottom:10}}>
              🏷️ 펫 이름 짓기
            </label>
            <input className="input-field"
              placeholder={`예) 뭉치, 솜이, 별이, ${student.name[0]}이`}
              value={petName}
              onChange={e=>setPetName(e.target.value)}
              maxLength={8}
              autoFocus
              onKeyDown={e=>e.key==='Enter'&&petName.trim()&&onDone(selType,petName.trim())}/>
            <div style={{fontSize:11,color:'#aaa',marginTop:6}}>최대 8글자</div>

          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-gray" style={{flex:1}} onClick={()=>setStep(1)}>

            </button>
            <button className="btn btn-primary" style={{flex:2,fontSize:15}}
              disabled={!petName.trim()}

              🌱 펫 키우기 시작!
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
